                    <tbody>{elevesClasse.map((e,i)=>(
                      <tr key={e.id} style={{borderTop:i>0?"1px solid #f8fafc":"none"}}>
                        <td style={{padding:"10px 18px",width:36,color:"#cbd5e1",fontSize:12}}>{i+1}</td>
                        <td style={{padding:"10px 6px"}}><div style={{display:"flex",alignItems:"center",gap:9}}>
                          <div style={{width:31,height:31,borderRadius:9,background:"rgba(26,86,219,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#1a56db",fontSize:11}}>{e.prenom?.[0]}{e.nom?.[0]}</div>
                          <div><div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{e.prenom} {e.nom}</div>{e.tuteur&&<div style={{fontSize:11,color:"var(--me-text-3)"}}>👤 {e.tuteur}</div>}</div>
                        </div></td>
                        <td style={{padding:"10px 6px",fontFamily:"monospace",fontSize:12,color:"var(--me-text-2)"}}>{e.matricule}</td>
                        <td style={{padding:"10px 18px",textAlign:"right"}}><div style={{display:"inline-flex",gap:6}}>
                          <button onClick={()=>{setErr("");setForm({nom:e.nom,prenom:e.prenom,genre:e.genre||"",classe_id:e.classe_id,date_naissance:e.date_naissance||"",lieu_naissance:e.lieu_naissance||"",tuteur:e.tuteur||"",pere:e.pere||"",tel_pere:e.tel_pere||"",mere:e.mere||"",tel_mere:e.tel_mere||"",telephone:e.telephone||"",frais_annuel:e.frais_annuel??"",frais_inscription_eleve:e.frais_inscription_eleve??"",inscPayee:false});setModal(e.id);}} style={{background:"var(--me-surface-2,#f1f5f9)",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>{t("btn_modifier")}</button>
                          <button onClick={()=>ops.deleteEleve(e.id)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>{t("btn_supprimer")}</button>
                        </div></td>
                      </tr>
                    ))}</tbody>
                  </table>
                )}
              </Card>
            );
          })}
        </div>
      )}
      {modal&&<Modal title={modal==="add"?t("el_inscrire_titre"):t("el_modifier")} onClose={()=>setModal(null)} w={540}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={t("el_nom")} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/>
          <Inp label={t("el_prenom")} value={form.prenom} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))}/>
          <Inp label={t("el_date_naiss")} type="date" value={form.date_naissance} onChange={e=>setForm(f=>({...f,date_naissance:e.target.value}))}/>
          <Inp label={t("el_lieu_naiss")} value={form.lieu_naissance} onChange={e=>setForm(f=>({...f,lieu_naissance:e.target.value}))}/>
          <Slt label={t("el_genre")} value={form.genre} onChange={e=>setForm(f=>({...f,genre:e.target.value}))} opts={[{v:"",l:t("el_choisir")},{v:"M",l:t("el_masculin")},{v:"F",l:t("el_feminin")}]}/>
          <div style={{gridColumn:"1/-1"}}><Slt label={t("el_classe")} value={form.classe_id} onChange={e=>setForm(f=>({...f,classe_id:e.target.value}))} opts={data.classes.map(c=>({v:c.id,l:txt(c.nom,c.nom_ar)}))}/></div>
          <Inp label={t("el_pere")} value={form.pere} onChange={e=>setForm(f=>({...f,pere:e.target.value}))} placeholder={t("el_nom_pere_ph")}/>
          <Inp label={t("el_tel_pere")} value={form.tel_pere} onChange={e=>setForm(f=>({...f,tel_pere:e.target.value}))}/>
          <Inp label={t("el_mere")} value={form.mere} onChange={e=>setForm(f=>({...f,mere:e.target.value}))} placeholder={t("el_nom_mere_ph")}/>
          <Inp label={t("el_tel_mere")} value={form.tel_mere} onChange={e=>setForm(f=>({...f,tel_mere:e.target.value}))}/>
          <Inp label={t("el_tuteur")} value={form.tuteur} onChange={e=>setForm(f=>({...f,tuteur:e.target.value}))}/>
          <Inp label={t("el_tel_tuteur")} value={form.telephone} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))}/>
          <div style={{gridColumn:"1/-1"}}><Inp label={`${t("el_frais_annuel")} (${etab.devise||"GNF"}) — ${t("el_defaut_ecole")}`} type="number" value={form.frais_annuel} onChange={e=>setForm(f=>({...f,frais_annuel:e.target.value}))} placeholder={etab.frais_annuel_defaut?`Défaut : ${etab.frais_annuel_defaut}`:""}/></div>
          <div style={{gridColumn:"1/-1"}}><Inp label={`${t("el_frais_insc")} (${etab.devise||"GNF"}) — ${t("el_defaut_ecole")}`} type="number" value={form.frais_inscription_eleve} onChange={e=>setForm(f=>({...f,frais_inscription_eleve:e.target.value}))} placeholder={etab.fraisInscription?`Défaut : ${etab.fraisInscription}`:""}/></div>
        </div>
        {modal==="add"&&<label style={{display:"flex",alignItems:"center",gap:9,padding:"10px 13px",background:"rgba(5,150,105,0.12)",border:"1px solid #bbf7d0",borderRadius:9,cursor:"pointer",marginTop:4}}>
          <input type="checkbox" checked={form.inscPayee} onChange={e=>setForm(f=>({...f,inscPayee:e.target.checked}))} style={{width:17,height:17,cursor:"pointer"}}/>
          <span style={{fontSize:12,fontWeight:600,color:"#166534"}}>{t("el_insc_payee")}</span>
        </label>}
        {err&&<div style={{background:"rgba(220,38,38,0.10)",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginTop:8}}>{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":t("btn_save")} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
      {impOpen&&<Modal title={t("imp_titre")} onClose={()=>setImpOpen(false)} w={540}>
        <div style={{fontSize:12,color:"var(--me-text-2)",marginBottom:12}}>{t("imp_intro")}</div>
        <Slt label={t("el_classe")} value={impClasse} onChange={e=>setImpClasse(e.target.value)} opts={data.classes.map(c=>({v:c.id,l:txt(c.nom,c.nom_ar)}))}/>
        <label style={{display:"inline-block",padding:"9px 14px",background:"#1a56db",color:"#fff",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",marginTop:2}}>{t("imp_choisir_fichier")}
          <input ref={impFileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={pickImport}/>
        </label>
        {impRows.length>0&&<div style={{marginTop:12,background:"rgba(5,150,105,0.12)",border:"1px solid #bbf7d0",borderRadius:9,padding:"10px 13px"}}>
          <div style={{fontSize:13,fontWeight:800,color:"#166534"}}>{impRows.length} {t("imp_detectes")}</div>
          <div style={{fontSize:11,color:"#15803d",marginTop:3}}>{impRows.slice(0,6).map(r=>`${r.prenom} ${r.nom}`).join(", ")}{impRows.length>6?"…":""}</div>
        </div>}
        {impErr&&<div style={{background:"rgba(220,38,38,0.10)",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginTop:8}}>{impErr}</div>}
        <div style={{fontSize:11,color:"var(--me-text-3)",marginTop:10}}>{t("imp_colonnes")}</div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setImpOpen(false)}/><Btn ch={impLoading?"...":t("imp_importer")} v="success" onClick={confirmImport} disabled={impLoading||impRows.length===0}/></div>
      </Modal>}
    </div>
  );
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function Notes({data,ops,etab,currentUser}) {
  const periodes=periodesList(etab);
  const [periode,setPeriode]=useState(periodes[0]);
  const [classeId,setClasseId]=useState(data.classes[0]?.id||"");
  const [localNotes,setLocalNotes]=useState({});
  const [saving,setSaving]=useState(false);
  const [dirty,setDirty]=useState(false);
  const [search,setSearch]=useState("");
  const [statBase,setStatBase]=useState("matiere");
  const [statPos,setStatPos]=useState("left");
  const [statTaille,setStatTaille]=useState("m");
  const inputsRef=useRef([]);
  const [impNotesOpen,setImpNotesOpen]=useState(false);const [impNotesData,setImpNotesData]=useState(null);const [impNotesLoading,setImpNotesLoading]=useState(false);const [impNotesErr,setImpNotesErr]=useState("");const impNotesRef=useRef(null);

  const classeSel=data.classes.find(c=>c.id===parseInt(classeId));
  const bareme=baremeOf(classeSel?.niveau);
  // Restriction matières : un Professeur ne voit que ses matières autorisées
  const isProf=currentUser?.role==="Professeur";
  const autorisees=Array.isArray(currentUser?.matieres_autorisees)?currentUser.matieres_autorisees:[];
  // Matières du cycle de la classe + filtrage prof
  const matieresCycle=data.matieres.filter(m=>(!m.cycles||m.cycles.length===0||m.cycles.includes(classeSel?.niveau)) && (!isProf||autorisees.includes(m.id)));
  const [matiereId,setMatiereId]=useState(matieresCycle[0]?.id||"");
  // Si la matière courante n'est plus valide (changement de classe), réajuster
  useEffect(()=>{ if(!matieresCycle.find(m=>m.id===parseInt(matiereId))){ setMatiereId(matieresCycle[0]?.id||""); } },[classeId,data.matieres]);

  const matiere=data.matieres.find(m=>m.id===parseInt(matiereId));
  const classeElevesAll=data.eleves.filter(e=>e.classe_id===parseInt(classeId));
  const computeNoteStat=(base)=>{
    const isF=e=>(e.genre||"").toLowerCase().startsWith("f");
    const seuil=bareme/2;
    const valOf = base==="generale"
      ? (e=>{const m=parseFloat(calcMoy(e.notes||{},data.matieres,periode));return isNaN(m)?null:m;})
      : (e=>{const v=localNotes[e.id];return (v===""||v==null||isNaN(parseFloat(v)))?null:parseFloat(v);});
    const insc=classeElevesAll, inscF=insc.filter(isF);
    const comp=insc.filter(e=>valOf(e)!=null), compF=comp.filter(isF);
    const moy=comp.filter(e=>valOf(e)>=seuil), moyF=moy.filter(isF);
    const pct=(a,b)=>b?Math.round(a/b*100)+"%":"0%";
    return [
      {label:t("stat_inscrit"),total:String(insc.length),filles:String(inscF.length)},
      {label:t("stat_ont_compose"),total:String(comp.length),filles:String(compF.length)},
      {label:t("stat_pas_compose"),total:String(insc.length-comp.length),filles:String(inscF.length-compF.length)},
      {label:t("stat_ont_moyenne"),total:String(moy.length),filles:String(moyF.length)},
      {label:t("stat_pas_moyenne"),total:String(comp.length-moy.length),filles:String(compF.length-moyF.length)},
      {label:t("stat_pourcentage"),total:pct(moy.length,comp.length),filles:pct(moyF.length,compF.length)},
    ];
  };
  const classeEleves=classeElevesAll.filter(e=>`${e.prenom} ${e.nom} ${e.matricule}`.toLowerCase().includes(search.toLowerCase()));

  useEffect(()=>{const n={};classeElevesAll.forEach(e=>{n[e.id]=e.notes?.[periode]?.[matiereId]??""});setLocalNotes(n);setDirty(false);},[periode,classeId,matiereId,data.eleves]);

  const setNote=(id,val)=>{setLocalNotes(n=>({...n,[id]:val}));setDirty(true);};
  const saveAll=async()=>{
    setSaving(true);
    const updates=classeElevesAll.map(e=>({id:e.id,notes:{...(e.notes||{}),[periode]:{...(e.notes?.[periode]||{}),[matiereId]:localNotes[e.id]===""||localNotes[e.id]==null?null:parseFloat(localNotes[e.id])}}}));
    await ops.saveAllNotes(updates);setSaving(false);setDirty(false);
  };
  // Navigation clavier : Entrée = champ suivant
  const onKey=(e,idx)=>{ if(e.key==="Enter"){e.preventDefault();const next=inputsRef.current[idx+1];if(next)next.focus();} };

  // Statistiques en direct
  const notesValides=classeElevesAll.map(e=>localNotes[e.id]).filter(v=>v!==""&&v!=null&&!isNaN(parseFloat(v))).map(v=>parseFloat(v));
  const moyClasse=notesValides.length?(notesValides.reduce((a,b)=>a+b,0)/notesValides.length):null;
  const plusHaut=notesValides.length?Math.max(...notesValides):null;
  const plusBas=notesValides.length?Math.min(...notesValides):null;
  const nbAdmis=notesValides.filter(v=>v>=bareme/2).length;
  const nbRemplies=notesValides.length;
  const totalEleves=classeElevesAll.length;

  const pickNotesFile=async(ev)=>{
    const file=ev.target.files?.[0];if(!file)return;setImpNotesErr("");setImpNotesData(null);
    try{
      const raw=await readXLSX(file);
      const norm=s=>(s||"").toString().trim().toLowerCase();
      const ignore=["n°","no","numéro","numero","élève","eleve","nom","prénom","prenom","matricule","moyenne","classe","appréciation","appreciation","mention","rang"];
      const subjCols={};Object.keys(raw[0]||{}).forEach(h=>{const hn=norm(h);if(ignore.includes(hn))return;const mat=data.matieres.find(m=>norm(m.nom)===hn||norm(m.nom_ar||"")===hn);if(mat)subjCols[h]=mat.id;});
      let matched=0,noteCount=0;const upMap={};
      raw.forEach(row=>{
        const matr=String(row.Matricule||row.matricule||"").trim();
        let stu=matr?classeElevesAll.find(e=>norm(e.matricule)===norm(matr)):null;
        if(!stu){const nm=norm(row["Élève"]||row.Eleve||row.eleve||"");if(nm)stu=classeElevesAll.find(e=>norm(`${e.prenom} ${e.nom}`)===nm||norm(`${e.nom} ${e.prenom}`)===nm);}
        if(!stu)return;matched++;
        const pNotes={...(stu.notes?.[periode]||{})};let changed=false;
        Object.entries(subjCols).forEach(([h,mid])=>{const v=row[h];if(v===""||v==null)return;const num=parseFloat(String(v).replace(",","."));if(isNaN(num))return;pNotes[mid]=num;noteCount++;changed=true;});
        if(changed){const all=upMap[stu.id]?.notes||{...(stu.notes||{})};all[periode]=pNotes;upMap[stu.id]={id:stu.id,notes:all};}
      });
      setImpNotesData({updates:Object.values(upMap),matched,noteCount,subjects:Object.keys(subjCols).length});
      if(!noteCount)setImpNotesErr(t("impn_aucun"));
    }catch(e2){setImpNotesErr(e2.message);}
    if(impNotesRef.current)impNotesRef.current.value="";
  };
  const confirmNotesImport=async()=>{if(!impNotesData?.updates?.length)return;setImpNotesLoading(true);await ops.saveAllNotes(impNotesData.updates);setImpNotesLoading(false);setImpNotesOpen(false);setImpNotesData(null);};
  const printFiche=()=>{
    const cl=classeSel;
    const rows=classeElevesAll.map((e,i)=>{const note=localNotes[e.id];const app=note!==""&&note!=null?MENTION(note,bareme):{t:"Non noté",c:"#94a3b8",bg:"#f8fafc"};return`<tr><td>${i+1}</td><td><b>${e.prenom} ${e.nom}</b></td><td>${e.matricule}</td><td style="text-align:center;font-weight:900;font-size:16px;color:${app.c}">${note!==""&&note!=null?note:"—"}</td><td>${app.t}</td></tr>`;}).join("");
    const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const SZ={p:{fs:9.5,pad:"3px 9px"},m:{fs:11,pad:"5px 12px"},g:{fs:13,pad:"8px 16px"}}[statTaille]||{fs:11,pad:"5px 12px"};
    const sr=computeNoteStat(statBase);
    const statHTML=(sr&&sr.length)?`<div style="text-align:${statPos}"><table style="border-collapse:collapse;margin-top:22px;display:inline-block;width:auto;text-align:left">
      <thead><tr>
        <th style="border:1px solid #94a3b8;padding:${SZ.pad};background:#1a56db;color:#fff;font-size:${SZ.fs}px;text-align:left">${t("stat_tableau").replace("📊 ","")}</th>
        <th style="border:1px solid #94a3b8;padding:${SZ.pad};background:#1a56db;color:#fff;font-size:${SZ.fs}px;text-align:center">${t("stat_total")}</th>
        <th style="border:1px solid #94a3b8;padding:${SZ.pad};background:#1a56db;color:#fff;font-size:${SZ.fs}px;text-align:center">${t("stat_filles")}</th>
      </tr></thead>
      <tbody>${sr.map(r=>`<tr><td style="border:1px solid #cbd5e1;padding:${SZ.pad};font-size:${SZ.fs}px;font-weight:600">${esc(r.label)}</td><td style="border:1px solid #cbd5e1;padding:${SZ.pad};font-size:${SZ.fs}px;text-align:center">${esc(r.total)}</td><td style="border:1px solid #cbd5e1;padding:${SZ.pad};font-size:${SZ.fs}px;text-align:center">${esc(r.filles)}</td></tr>`).join("")}</tbody>
    </table></div>`:"";
    printHTML(`${officialHeader(etab,{classe:cl?.nom,docTitle:`Fiche de notes — ${matiere?.nom}`})}
    <p style="font-size:12px;color:#475569">Période : <b>${periode}</b> · Coefficient : <b>${matiere?.coefficient}</b> · Enseignant : <b>${matiere?.enseignant||"—"}</b></p>
    <table><tr><th>N°</th><th>Élève</th><th>Matricule</th><th>Note /${bareme}</th><th>Appréciation</th></tr>${rows}</table>
    ${statHTML}
    <div class="sign"><span>Le/La titulaire : ____________________</span><span>Date : ____________</span></div>`,`Fiche Notes - ${matiere?.nom}`,{etab});
  };

  if(data.classes.length===0||data.matieres.length===0) return <Card><Empty icon="📝" text={t("no_creez")}/></Card>;
  if(isProf&&autorisees.length===0) return <Card><Empty icon="🔒" text={t("no_prof_aucune")}/></Card>;

  return(
    <div>
      <SHdr title={t("nav_notes")+" 📝"} sub={t("no_sub")} action={
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
          {dirty&&<span style={{fontSize:11,color:"#c2410c",fontWeight:700,background:"#fff7ed",padding:"5px 11px",borderRadius:8,border:"1px solid #fed7aa"}}>{t("no_unsaved")}</span>}
          <ExportBar name={`notes_${(classeSel?.nom||"classe")}_${periode}`.replace(/\s+/g,"_")} title={`${t("nav_notes")} — ${classeSel?.nom||""} — ${periode}`} getRows={()=>classeElevesAll.map((e,i)=>{const row={"N°":i+1,"Élève":`${e.prenom} ${e.nom}`,Matricule:e.matricule};matieresCycle.forEach(m=>{const n=e.notes?.[periode]?.[m.id];row[m.nom]=(n!=null&&n!=="")?n:"";});row["Moyenne"]=calcMoy(e.notes||{},data.matieres,periode);return row;})}/>
          <Btn ch={t("no_fiche")} v="ghost" onClick={printFiche}/>
          <Btn ch={t("imp_notes")} v="ghost" onClick={()=>{setImpNotesErr("");setImpNotesData(null);setImpNotesOpen(true);}}/>
          <Btn ch={saving?t("no_sync"):(dirty?t("no_save"):t("no_saved"))} v={dirty?"success":"ghost"} onClick={saveAll} disabled={saving||!dirty}/>
        </div>
      }/>
      <Card s={{marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:13}}>
          <Slt label={t("no_periode")} value={periode} onChange={e=>setPeriode(e.target.value)} opts={periodes.map(p=>({v:p,l:periodeLabel(etab,p)}))}/>
          <Slt label={t("no_classe")} value={classeId} onChange={e=>{setClasseId(e.target.value);}} opts={data.classes.map(c=>({v:c.id,l:txt(c.nom,c.nom_ar)}))}/>
          <Slt label={t("no_matiere")} value={matiereId} onChange={e=>setMatiereId(e.target.value)} opts={matieresCycle.length?matieresCycle.map(m=>({v:m.id,l:`${txt(m.nom,m.nom_ar)} (${t("no_coef")} ${m.coefficient})`})):[{v:"",l:t("no_aucune_mat")}]}/>
        </div>
        {isProf&&<div style={{fontSize:11,color:"#1a56db",marginTop:8,fontWeight:600}}>{t("no_prof_info")}</div>}
      </Card>

      {matieresCycle.length===0?<Card><Empty icon="📚" text={t("no_aucune_cycle")}/></Card>:
       classeElevesAll.length===0?<Card><Empty icon="👨‍🎓" text={t("el_aucun_eleve")}/></Card>:(
        <>
          {/* Statistiques en direct */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:11,marginBottom:14}}>
            <div style={{background:"var(--me-surface,#fff)",borderRadius:14,padding:"13px 16px",border:"1px solid #eef2f7"}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("no_moy_classe")}</div><div style={{fontSize:21,fontWeight:900,color:moyClasse!=null?(moyClasse>=bareme/2?"#059669":"#dc2626"):"#cbd5e1",fontFamily:"'Sora',sans-serif"}}>{moyClasse!=null?moyClasse.toFixed(2):"—"}<span style={{fontSize:12,color:"#cbd5e1",fontWeight:600}}>/{bareme}</span></div></div>
            <div style={{background:"var(--me-surface,#fff)",borderRadius:14,padding:"13px 16px",border:"1px solid #eef2f7"}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("no_plus_haute")}</div><div style={{fontSize:21,fontWeight:900,color:"#059669",fontFamily:"'Sora',sans-serif"}}>{plusHaut!=null?plusHaut:"—"}</div></div>
            <div style={{background:"var(--me-surface,#fff)",borderRadius:14,padding:"13px 16px",border:"1px solid #eef2f7"}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("no_plus_basse")}</div><div style={{fontSize:21,fontWeight:900,color:"#dc2626",fontFamily:"'Sora',sans-serif"}}>{plusBas!=null?plusBas:"—"}</div></div>
            <div style={{background:"var(--me-surface,#fff)",borderRadius:14,padding:"13px 16px",border:"1px solid #eef2f7"}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("no_admis")} (≥{bareme/2})</div><div style={{fontSize:21,fontWeight:900,color:"#1a56db",fontFamily:"'Sora',sans-serif"}}>{nbAdmis}<span style={{fontSize:12,color:"#cbd5e1",fontWeight:600}}>/{nbRemplies}</span></div></div>
            <div style={{background:"var(--me-surface,#fff)",borderRadius:14,padding:"13px 16px",border:"1px solid #eef2f7"}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("no_saisies")}</div><div style={{fontSize:21,fontWeight:900,color:"var(--me-text)",fontFamily:"'Sora',sans-serif"}}>{nbRemplies}<span style={{fontSize:12,color:"#cbd5e1",fontWeight:600}}>/{totalEleves}</span></div></div>
          </div>

          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>📋 {txt(matiere?.nom,matiere?.nom_ar)} — {periodeLabel(etab,periode)}</div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("no_search")} style={{padding:"7px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",width:210}}/>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:"var(--me-surface-2,#f8fafc)"}}>{["N°",t("no_eleve"),`${t("no_note")} /${bareme}`,t("no_appreciation")].map(h=><th key={h} style={{padding:"10px 13px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--me-text-3)",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
              <tbody>{classeEleves.map((e,i)=>{
                const note=localNotes[e.id]??"";const m=note!==""?MENTION(note,bareme):null;
                return(<tr key={e.id} className="me-row" style={{borderTop:"1px solid #f4f7fb"}}>
                  <td style={{padding:"9px 13px",fontSize:12,color:"var(--me-text-3)"}}>{i+1}</td>
                  <td style={{padding:"9px 13px"}}><div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{e.prenom} {e.nom}</div><div style={{fontSize:11,color:"var(--me-text-3)"}}>{e.matricule}</div></td>
                  <td style={{padding:"7px 13px"}}><input ref={el=>inputsRef.current[i]=el} onKeyDown={ev=>onKey(ev,i)} type="number" min="0" max={bareme} step="0.25" value={note} onChange={ev=>setNote(e.id,ev.target.value)} style={{width:80,padding:"8px 10px",borderRadius:9,border:`2px solid ${note!==""&&parseFloat(note)<bareme/2?"#fca5a5":"#e2e8f0"}`,fontSize:14,fontWeight:700,textAlign:"center",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",color:m?.c||"var(--me-text)"}}/></td>
                  <td style={{padding:"9px 13px"}}>{m&&<span style={{background:m.bg,color:m.c,borderRadius:7,padding:"3px 9px",fontSize:11,fontWeight:700}}>{m.t}</span>}</td>
                </tr>);
              })}</tbody>
            </table>
            {classeEleves.length===0&&<div style={{padding:18,textAlign:"center",color:"var(--me-text-3)",fontSize:12}}>{t("no_no_result")}</div>}
          </Card>
          {/* Tableau statistique (mise à jour automatique) · imprimé au bas de la fiche */}
          {(()=>{
            const Seg=({v,lbl})=><button onClick={()=>setStatBase(v)} style={{padding:"5px 11px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",background:statBase===v?"#1a56db":"#f1f5f9",color:statBase===v?"#fff":"#64748b"}}>{lbl}</button>;
            const selSt={padding:"5px 9px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"};
            const sr=computeNoteStat(statBase);
            return(
              <Card s={{marginTop:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:3}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{t("stat_tableau")}</div>
                  <div style={{display:"flex",gap:5}}><Seg v="matiere" lbl={t("stat_mode_matiere")}/><Seg v="generale" lbl={t("stat_mode_generale")}/></div>
                </div>
                <div style={{fontSize:11,color:"var(--me-text-3)",marginBottom:11}}>{statBase==="generale"?periodeLabel(etab,periode):`${txt(matiere?.nom,matiere?.nom_ar)} — ${periodeLabel(etab,periode)}`}</div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:11}}>
                  <span style={{fontSize:11,fontWeight:700,color:"var(--me-text-3)"}}>{t("fn_stat_pos")}</span>
                  <select value={statPos} onChange={e=>setStatPos(e.target.value)} style={selSt}>
                    <option value="left">{t("fn_align_g")}</option><option value="center">{t("fn_align_c")}</option><option value="right">{t("fn_align_d")}</option>
                  </select>
                  <span style={{fontSize:11,fontWeight:700,color:"var(--me-text-3)",marginLeft:4}}>{t("fn_stat_taille")}</span>
                  <select value={statTaille} onChange={e=>setStatTaille(e.target.value)} style={selSt}>
                    <option value="p">{t("fn_taille_p")}</option><option value="m">{t("fn_taille_m")}</option><option value="g">{t("fn_taille_g")}</option>
                  </select>
                </div>
                <Tbl cols={[t("stat_tableau"),t("stat_total"),t("stat_filles")]} empty={null} rows={sr.map((r,i)=>(
                  <TR key={i}><TD bold>{r.label}</TD><TD>{r.total}</TD><TD>{r.filles}</TD></TR>
                ))}/>
              </Card>
            );
          })()}
        </>
      )}
      {impNotesOpen&&<Modal title={t("impn_titre")} onClose={()=>setImpNotesOpen(false)} w={540}>
        <div style={{fontSize:12,color:"var(--me-text-2)",marginBottom:6}}>{t("impn_intro")}</div>
        <div style={{fontSize:12,fontWeight:700,color:"var(--me-text)",background:"var(--me-surface-2,#f8fafc)",borderRadius:9,padding:"9px 12px",marginBottom:12}}>{t("no_periode")} : {periodeLabel(etab,periode)} · {t("no_classe")} : {txt(classeSel?.nom,classeSel?.nom_ar)}</div>
        <label style={{display:"inline-block",padding:"9px 14px",background:"#1a56db",color:"#fff",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer"}}>{t("imp_choisir_fichier")}
          <input ref={impNotesRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={pickNotesFile}/>
        </label>
        {impNotesData&&impNotesData.noteCount>0&&<div style={{marginTop:12,background:"rgba(5,150,105,0.12)",border:"1px solid #bbf7d0",borderRadius:9,padding:"10px 13px"}}>
          <div style={{fontSize:13,fontWeight:800,color:"#166534"}}>{impNotesData.matched} {t("impn_reconnus")} · {impNotesData.noteCount} {t("impn_notes_n")}</div>
          <div style={{fontSize:11,color:"#15803d",marginTop:3}}>{impNotesData.subjects} {t("impn_mats")}</div>
        </div>}
        {impNotesErr&&<div style={{background:"rgba(220,38,38,0.10)",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginTop:8}}>{impNotesErr}</div>}
        <div style={{fontSize:11,color:"var(--me-text-3)",marginTop:10}}>{t("impn_colonnes")}</div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setImpNotesOpen(false)}/><Btn ch={impNotesLoading?"...":t("impn_importer")} v="success" onClick={confirmNotesImport} disabled={impNotesLoading||!impNotesData||!impNotesData.noteCount}/></div>
      </Modal>}
    </div>
  );
}

// ── BULLETINS ─────────────────────────────────────────────────────────────────
function Bulletins({data,etab}) {
  const periodes=periodesList(etab);
  const [selected,setSelected]=useState(null);
  const [periode,setPeriode]=useState(periodes[0]);
  const [modeBul,setModeBul]=useState("periode"); // "periode" | "annuel"
  const [filterCl,setFilterCl]=useState("");
  const filtered=data.eleves.filter(e=>!filterCl||e.classe_id===parseInt(filterCl));

  // Bulletin cumulé : affiche les périodes fournies côte à côte + moyennes + moyenne cumulée
  const bulletinAnnuelHTML=(e,persInput)=>{
    const pers = persInput && persInput.length ? persInput : periodes;
    const cl=data.classes.find(c=>c.id===e.classe_id);
    const bareme=baremeOf(cl?.niveau);
    const moyP=pers.map(p=>parseFloat(calcMoy(e.notes||{},data.matieres,p))).map(v=>isNaN(v)?null:v);
    const moyAnnuelle=(()=>{const vals=moyP.filter(v=>v!=null);return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):null;})();
    const mAnn=moyAnnuelle!=null?MENTION(moyAnnuelle,bareme):{t:"—",c:"#94a3b8",bg:"#f8fafc"};
    const classmates=data.eleves.filter(x=>x.classe_id===e.classe_id);
    const rangAnn=classmates.map(x=>{const mp=pers.map(p=>parseFloat(calcMoy(x.notes||{},data.matieres,p))).filter(v=>!isNaN(v));return{id:x.id,moy:mp.length?mp.reduce((a,b)=>a+b,0)/mp.length:0};}).sort((a,b)=>b.moy-a.moy).findIndex(x=>x.id===e.id)+1;
    const estAnnuel = pers.length===periodes.length;
    const single = pers.length===1; // une seule période : pas de colonne Moy. redondante
    // Décision de passage (bulletin annuel) : moyenne ≥ bareme/2 → admis, sinon redouble
    const admis = moyAnnuelle!=null && moyAnnuelle>=bareme/2;
    const gF = e.genre==="F";
    const decFr = admis ? `✓ Admis${gF?"e":""} — Passe en classe supérieure` : `Redoublant${gF?"e":""} — Redouble la classe`;
    const decAr = admis ? `✓ ${gF?"ناجحة":"ناجح"} — ينتقل إلى القسم الأعلى` : `${gF?"راسبة":"راسب"} — يعيد السنة`;
    const bilD = etab.langue==="fr_ar"; // document bilingue FR + AR
    const arD = etab.langue==="ar";     // document en arabe (repli FR si pas de trad)
    const arS = s => `<span style="font-family:'Traditional Arabic','Amiri',serif;direction:rtl">${s}</span>`;
    const dl = (fr,ar) => arD ? (ar?arS(ar):fr) : (bilD && ar ? `${fr} <span style="color:#cbd5e1;font-weight:400">/</span> ${arS(ar)}` : fr);
    const nm = (fr,ar) => arD ? (ar?arS(ar):(fr||"")) : (bilD && ar ? `${fr} <span style="color:#94a3b8;font-weight:400">/</span> ${arS(ar)}` : (fr||""));
    const perAr = p => { const it=periodeItems(etab).find(x=>x.n===p); return it&&it.ar; };
    const titreDoc = estAnnuel ? `Bulletin annuel — ${etab.annee||""}` : `Bulletin de notes — ${pers[pers.length-1]}`;
    const titreDocAr = (bilD||arD) ? (estAnnuel ? `الكشف السنوي — ${etab.annee||""}` : `كشف الدرجات — ${perAr(pers[pers.length-1])||""}`) : "";
    const entetesP=pers.map(p=>`<th style="text-align:center">${dl(p,perAr(p))}</th>`).join("");
    const lignes=data.matieres.map((mat,i)=>{
      const cells=pers.map(p=>{const note=e.notes?.[p]?.[mat.id];return`<td style="text-align:center;font-weight:700;color:${note!=null&&note!==""?"#0f172a":"#cbd5e1"}">${note!=null&&note!==""?note:"—"}</td>`;}).join("");
      const vals=pers.map(p=>e.notes?.[p]?.[mat.id]).filter(n=>n!=null&&n!=="").map(parseFloat);
      const moyMat=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):"—";
      return`<tr style="background:${i%2===0?"#f8fafc":"#fff"}"><td>${nm(mat.nom,mat.nom_ar)}</td><td style="text-align:center">×${mat.coefficient}</td>${cells}${single?"":`<td style="text-align:center;font-weight:900;color:${etab.theme_couleur||"#1a56db"}">${moyMat}</td>`}</tr>`;
    }).join("");
    const moyRow=`<tr style="background:#eff6ff;font-weight:800"><td colspan="2">${dl("Moyenne","المعدل")}</td>${moyP.map(v=>`<td style="text-align:center;color:${v!=null&&v>=bareme/2?"#059669":v!=null?"#dc2626":"#cbd5e1"}">${v!=null?v.toFixed(2):"—"}</td>`).join("")}${single?"":`<td style="text-align:center;color:${etab.theme_couleur||"#1a56db"}">${moyAnnuelle!=null?moyAnnuelle.toFixed(2):"—"}</td>`}</tr>`;
    const labelMoyGen = single ? dl("Moyenne","المعدل") : (estAnnuel ? dl("Moyenne annuelle","المعدل السنوي") : dl("Moyenne cumulée","المعدل التراكمي"));
    return`${officialHeader(etab,{classe:nm(cl?.nom,cl?.nom_ar),docTitle:titreDoc,docTitleAr:titreDocAr})}
    <div class="grid" style="grid-template-columns:1fr 1fr 1fr 1fr"><div><div style="font-size:10px;color:#666;text-transform:uppercase">${dl("Élève","التلميذ")}</div><b>${e.prenom} ${e.nom}</b></div><div><div style="font-size:10px;color:#666;text-transform:uppercase">${dl("Matricule","رقم التسجيل")}</div><b style="font-family:monospace">${e.matricule}</b></div><div><div style="font-size:10px;color:#666;text-transform:uppercase">${dl("Classe","القسم")}</div><b>${nm(cl?.nom,cl?.nom_ar)}</b></div><div><div style="font-size:10px;color:#666;text-transform:uppercase">${dl("Année","السنة")}</div><b>${etab.annee||""}</b></div></div>
    ${(e.pere||e.mere||e.tuteur)?`<div class="grid" style="grid-template-columns:1fr 1fr;margin-top:-6px">${e.pere?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">${dl("Père","الأب")}</div><b>${e.pere}</b>${e.tel_pere?` <span style="color:#64748b;font-weight:400">(${e.tel_pere})</span>`:""}</div>`:""}${e.mere?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">${dl("Mère","الأم")}</div><b>${e.mere}</b>${e.tel_mere?` <span style="color:#64748b;font-weight:400">(${e.tel_mere})</span>`:""}</div>`:""}</div>`:""}
    <table><tr><th>${dl("Matière","المادة")}</th><th>${dl("Coeff.","المعامل")}</th>${entetesP}${single?"":`<th style="text-align:center">${dl("Moy.","المعدل")}</th>`}</tr>${lignes}${moyRow}</table>
    <div class="result" style="background:${mAnn.bg};border:2px solid ${mAnn.c}40"><div class="stat"><div class="stat-val" style="color:${mAnn.c}">${moyAnnuelle!=null?moyAnnuelle.toFixed(2):"—"}</div><div class="stat-lbl">${labelMoyGen} /${bareme}</div></div><div class="stat"><div class="stat-val" style="color:${mAnn.c};font-size:18px">${mAnn.t}</div><div class="stat-lbl">${dl("Mention","التقدير")}</div></div><div class="stat"><div class="stat-val">${rangAnn}/${classmates.length}</div><div class="stat-lbl">${dl("Rang","الرتبة")}</div></div></div>
    ${estAnnuel&&moyAnnuelle!=null?`<div style="margin-top:12px;text-align:center;padding:10px;border-radius:9px;font-weight:800;font-size:13px;background:${admis?"#ecfdf5":"#fef2f2"};color:${admis?"#047857":"#dc2626"};border:1.5px solid ${admis?"#10b981":"#fca5a5"}">${dl("Décision du conseil","قرار المجلس")} : ${dl(decFr,decAr)}</div>`:""}
    <div class="sign" style="margin-top:40px"><span style="text-align:center">${dl(etab.signataire_grade||"Le Directeur","المدير")}<br/>${etab.signataire_nom?`<b>${etab.signataire_nom}</b><br/>`:""}</span><span style="text-align:center">${dl("L'Enseignant(e)","المعلم(ة)")}<br/><br/></span></div>
    <p style="text-align:center;font-size:10px;color:#cbd5e1;margin-top:16px">Généré par MonEcole · ${etab.email||""}</p>`;
  };

  const bulletinHTML=(e,p)=>{
    const moy=calcMoy(e.notes||{},data.matieres,p);
    const cl=data.classes.find(c=>c.id===e.classe_id);
    const bareme=baremeOf(cl?.niveau);const m=MENTION(moy,bareme);
    const classmates=data.eleves.filter(x=>x.classe_id===e.classe_id);
    const rang=classmates.map(x=>({id:x.id,moy:parseFloat(calcMoy(x.notes||{},data.matieres,p))||0})).sort((a,b)=>b.moy-a.moy).findIndex(x=>x.id===e.id)+1;
    const lignes=data.matieres.map((mat,i)=>{const note=e.notes?.[p]?.[mat.id];const app=note!=null&&note!==""?MENTION(note,bareme):{t:"Non noté",c:"#94a3b8",bg:"#f8fafc"};return`<tr style="background:${i%2===0?"#f8fafc":"#fff"}"><td>${txt(mat.nom,mat.nom_ar)}</td><td style="text-align:center">×${mat.coefficient}</td><td style="text-align:center;font-weight:900;font-size:16px;color:${app.c}">${note!=null&&note!==""?note:"—"}</td><td style="text-align:center">${note!=null&&note!==""?(parseFloat(note)*mat.coefficient).toFixed(2):"—"}</td><td style="text-align:center"><span style="background:${app.bg};color:${app.c};padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700">${app.t}</span></td></tr>`;}).join("");
    return`${officialHeader(etab,{classe:cl?.nom,docTitle:`Bulletin de notes — ${p}`})}
    ${etab.devise_txt?`<p style="text-align:center;font-style:italic;color:#64748b;margin:0 0 10px">${etab.devise_txt}</p>`:""}
    <div class="grid" style="grid-template-columns:1fr 1fr 1fr 1fr"><div><div style="font-size:10px;color:#666;text-transform:uppercase">Élève</div><b>${e.prenom} ${e.nom}</b></div><div><div style="font-size:10px;color:#666;text-transform:uppercase">Matricule</div><b style="font-family:monospace">${e.matricule}</b></div><div><div style="font-size:10px;color:#666;text-transform:uppercase">Classe</div><b>${txt(cl?.nom,cl?.nom_ar)}</b></div><div><div style="font-size:10px;color:#666;text-transform:uppercase">Année</div><b>${etab.annee||""}</b></div></div>
    ${(e.pere||e.mere||e.tuteur)?`<div class="grid" style="grid-template-columns:1fr 1fr;margin-top:-6px">${e.pere?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">Père</div><b>${e.pere}</b>${e.tel_pere?` <span style="color:#64748b;font-weight:400">(${e.tel_pere})</span>`:""}</div>`:""}${e.mere?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">Mère</div><b>${e.mere}</b>${e.tel_mere?` <span style="color:#64748b;font-weight:400">(${e.tel_mere})</span>`:""}</div>`:""}${e.tuteur?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">Tuteur</div><b>${e.tuteur}</b>${e.telephone?` <span style="color:#64748b;font-weight:400">(${e.telephone})</span>`:""}</div>`:""}</div>`:""}
    <table><tr><th>Matière</th><th>Coeff.</th><th>Note /${bareme}</th><th>Points</th><th>Appréciation</th></tr>${lignes}</table>
    <div class="result" style="background:${m.bg};border:2px solid ${m.c}40"><div class="stat"><div class="stat-val" style="color:${m.c}">${moy}</div><div class="stat-lbl">Moyenne /${bareme}</div></div><div class="stat"><div class="stat-val" style="color:${m.c};font-size:18px">${m.t}</div><div class="stat-lbl">Mention</div></div><div class="stat"><div class="stat-val">${rang}/${classmates.length}</div><div class="stat-lbl">Rang</div></div></div>
    <div class="sign" style="margin-top:40px"><span style="text-align:center">${etab.signataire_grade||"Le Directeur"}<br/>${etab.signataire_nom?`<b>${etab.signataire_nom}</b><br/>`:""}</span><span style="text-align:center">L'Enseignant(e)<br/><br/></span></div>
    <p style="text-align:center;font-size:10px;color:#cbd5e1;margin-top:16px">Généré par MonEcole · ${etab.email||""}</p>`;
  };

  if(selected){
    const e=selected;const moy=calcMoy(e.notes||{},data.matieres,periode);
    const cl=data.classes.find(c=>c.id===e.classe_id);
    const bareme=baremeOf(cl?.niveau);const m=MENTION(moy,bareme);
    const classmates=data.eleves.filter(x=>x.classe_id===e.classe_id);
    const rang=classmates.map(x=>({id:x.id,moy:parseFloat(calcMoy(x.notes||{},data.matieres,periode))||0})).sort((a,b)=>b.moy-a.moy).findIndex(x=>x.id===e.id)+1;
    return(
      <div>
        <div style={{display:"flex",gap:9,marginBottom:18,alignItems:"center",flexWrap:"wrap"}}>
          <Btn ch={t("pa_retour")} v="ghost" onClick={()=>setSelected(null)}/>
          <select value={modeBul} onChange={ev=>setModeBul(ev.target.value)} style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>
            <option value="periode">{t("bu_par_periode")}</option>
            <option value="annuel">{t("bu_annuel")}</option>
          </select>
          {modeBul==="periode"&&<select value={periode} onChange={ev=>setPeriode(ev.target.value)} style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{periodes.map(p=><option key={p} value={p}>{periodeLabel(etab,p)}</option>)}</select>}
          <Btn ch={t("pa_imprimer")} v="primary" onClick={()=>{const idx=periodes.indexOf(periode);const persCumul=periodes.slice(0,idx+1);printHTML(modeBul==="annuel"?bulletinAnnuelHTML(e):bulletinAnnuelHTML(e,persCumul),`Bulletin ${e.prenom} ${e.nom}`,{etab});}}/>
          <Btn ch={t("imp_word")} v="ghost" onClick={()=>{const idx=periodes.indexOf(periode);const persCumul=periodes.slice(0,idx+1);const html=modeBul==="annuel"?bulletinAnnuelHTML(e):bulletinAnnuelHTML(e,persCumul);exportDocHTML(html,`bulletin_${e.prenom}_${e.nom}`.replace(/\s+/g,"_")+".doc",etab);}}/>
        </div>
        {modeBul==="annuel"?(
          <div style={{background:"var(--me-surface,#fff)",borderRadius:18,padding:32,maxWidth:820,margin:"0 auto",boxShadow:"0 4px 24px rgba(0,0,0,0.08)",border:"1.5px solid #e2e8f0",overflowX:"auto"}} dir="ltr">
            <div dangerouslySetInnerHTML={{__html:`<style>.oh{margin-bottom:18px}.oh-top{text-align:center;margin-bottom:10px}.oh-pays{font-size:15px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}.oh-devise{font-size:11px;font-style:italic;color:#475569;margin-top:1px}.oh-body{display:flex;justify-content:space-between;align-items:center;gap:14px;font-size:11px;color:#334155;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:9px 0}.oh-left,.oh-right{flex:1}.oh-left>div,.oh-right>div{margin:1px 0}.oh-right{text-align:right}.oh-mid{flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:0 6px}.oh-title{text-align:center;margin-top:12px;font-size:16px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#0f172a;border:2px solid #1a56db;border-radius:8px;padding:7px 0;background:#eff6ff}table{width:100%;border-collapse:collapse;margin:4px 0}td,th{border:1px solid #d8dee9;padding:4px 8px;font-size:11px}th{background:#1a56db;color:#fff;font-weight:700}.grid{display:grid;gap:7px;background:#f7f9fc;padding:10px;border-radius:10px;margin-bottom:10px}.result{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px;border-radius:10px;margin-top:10px}.stat{text-align:center}.stat-val{font-size:26px;font-weight:900}.stat-lbl{font-size:10px;color:#666;text-transform:uppercase}.sign{margin-top:34px;display:flex;justify-content:space-between;font-size:12px}</style>`+bulletinAnnuelHTML(e)}}/>
          </div>
        ):(

          <div dangerouslySetInnerHTML={{__html:`<style>.oh{margin-bottom:18px}.oh-top{text-align:center;margin-bottom:10px}.oh-pays{font-size:15px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}.oh-devise{font-size:11px;font-style:italic;color:#475569;margin-top:1px}.oh-body{display:flex;justify-content:space-between;align-items:center;gap:14px;font-size:11px;color:#334155;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:9px 0}.oh-left,.oh-right{flex:1}.oh-left>div,.oh-right>div{margin:1px 0}.oh-right{text-align:right}.oh-mid{flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:0 6px}.oh-title{text-align:center;margin:12px auto 0;font-size:16px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#0f172a;border:2px solid ${etab.theme_couleur||"#1a56db"};border-radius:8px;padding:7px 18px;background:${(etab.theme_couleur||"#1a56db")}12;display:block;max-width:60%}table{width:100%;border-collapse:collapse;margin:4px 0}td,th{border:1px solid #d8dee9;padding:4px 8px;font-size:11px}th{background:${etab.theme_couleur||"#1a56db"};color:#fff;font-weight:700}.grid{display:grid;gap:7px;background:#f7f9fc;padding:10px;border-radius:10px;margin-bottom:10px}.result{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px;border-radius:10px;margin-top:10px}.stat{text-align:center}.stat-val{font-size:26px;font-weight:900}.stat-lbl{font-size:10px;color:#666;text-transform:uppercase}.sign{margin-top:34px;display:flex;justify-content:space-between;font-size:12px}</style>`+bulletinAnnuelHTML(e,periodes.slice(0,periodes.indexOf(periode)+1))}}/>
        </div>
        )}
      </div>
    );
  }
  return(
    <div>
      <SHdr title={t("nav_bulletins")+" 📄"} sub={t("bu_sub")} action={
        <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <select value={periode} onChange={e=>setPeriode(e.target.value)} style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{periodes.map(p=><option key={p} value={p}>{periodeLabel(etab,p)}</option>)}</select>
          <select value={filterCl} onChange={e=>setFilterCl(e.target.value)} style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}><option value="">{t("bu_toutes_classes")}</option>{data.classes.map(c=><option key={c.id} value={c.id}>{txt(c.nom,c.nom_ar)}</option>)}</select>
          <Btn ch={t("imp_export")} v="ghost" onClick={async()=>{const rows=filtered.map(e=>{const cl=data.classes.find(c=>c.id===e.classe_id);const bareme=baremeOf(cl?.niveau);const moy=parseFloat(calcMoy(e.notes||{},data.matieres,periode));const m=MENTION(isNaN(moy)?0:moy,bareme);const mates=data.eleves.filter(x=>x.classe_id===e.classe_id).map(x=>({id:x.id,v:parseFloat(calcMoy(x.notes||{},data.matieres,periode))||0})).sort((a,b)=>b.v-a.v);const rang=mates.findIndex(x=>x.id===e.id)+1;return {"Élève":`${e.prenom} ${e.nom}`,Matricule:e.matricule,Classe:cl?cl.nom:"","Moyenne":isNaN(moy)?"":moy.toFixed(2),"Mention":m.t,"Rang":`${rang}/${mates.length}`};});if(!rows.length){alert(t("imp_rien_exporter"));return;}try{await exportXLSX(rows,`bulletins_${periode}`.replace(/\s+/g,"_")+".xlsx","Bulletins");}catch(e2){alert(e2.message);}}}/>
          <Btn ch={t("imp_word")} v="ghost" onClick={()=>{if(!filtered.length){alert(t("imp_rien_exporter"));return;}const idx=periodes.indexOf(periode);const persCumul=periodes.slice(0,idx+1);const inner=filtered.map((e,i)=>`${bulletinAnnuelHTML(e,persCumul)}${i<filtered.length-1?'<div class="page-break"></div>':""}`).join("");exportDocHTML(inner,`bulletins_${periode}`.replace(/\s+/g,"_")+".doc",etab);}}/>
          <Btn ch={t("bu_tout_imprimer")} v="warn" onClick={()=>{if(!filtered.length)return;const idx=periodes.indexOf(periode);const persCumul=periodes.slice(0,idx+1);const html=filtered.map((e,i)=>`${bulletinAnnuelHTML(e,persCumul)}${i<filtered.length-1?'<div class="page-break"></div>':""}`).join("");printHTML(html,"Bulletins — "+periode,{etab});}}/>
        </div>
      }/>
      {data.eleves.length===0?<Card><Empty icon="📄" text={t("bu_aucun_eleve")}/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(e=>{const moy=calcMoy(e.notes||{},data.matieres,periode);const cl=data.classes.find(c=>c.id===e.classe_id);const bareme=baremeOf(cl?.niveau);const m=MENTION(moy,bareme);return(
            <div key={e.id} onClick={()=>setSelected(e)} style={{background:"var(--me-surface,#fff)",borderRadius:12,padding:"13px 17px",boxShadow:"0 1px 6px rgba(0,0,0,0.05)",border:"1.5px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",transition:"all 0.15s"}} onMouseOver={ev=>{ev.currentTarget.style.borderColor="#1a56db";}} onMouseOut={ev=>{ev.currentTarget.style.borderColor="#f1f5f9";}}>
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <div style={{width:36,height:36,borderRadius:10,background:"rgba(26,86,219,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#1a56db",fontSize:12}}>{e.prenom?.[0]}{e.nom?.[0]}</div>
                <div><div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{e.prenom} {e.nom}</div><div style={{fontSize:11,color:"var(--me-text-3)"}}>{txt(cl?.nom,cl?.nom_ar)} · {e.matricule}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:13}}>
                <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:16,color:m.c}}>{moy}/{bareme}</div><span style={{background:m.bg,color:m.c,borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:700}}>{m.t}</span></div>
                <span style={{color:"#cbd5e1",fontSize:17}}>›</span>
              </div>
            </div>);
          })}
        </div>
      )}
    </div>
  );
}

// ── PAIEMENTS ─────────────────────────────────────────────────────────────────
function Paiements({data,ops,etab}) {
  const devise=etab.devise||"GNF";
  const echeances=echeancesList(etab);
  const isTranche=(etab.mode_paiement||"mensualite")==="tranche";
  const [modal,setModal]=useState(null);
  const [selEleve,setSelEleve]=useState("");
  const [payCycle,setPayCycle]=useState("Primaire");
  const [form,setForm]=useState({eleve_id:"",type:"Scolarité",montant:"",date:TODAY,mois:"",note:"",moyen:""});
  const [loading,setLoading]=useState(false);
  const [recuPret,setRecuPret]=useState(null);

  // Paiements d'un élève pour une échéance donnée
  const payeEcheance=(eleveId,ech)=>data.paiements.filter(p=>p.eleve_id===eleveId&&p.mois===ech).reduce((s,p)=>s+(p.montant||0),0);
  const totalPayeEleve=(eleveId)=>data.paiements.filter(p=>p.eleve_id===eleveId&&p.type!=="Frais d'inscription"&&p.type!=="Frais d'examen").reduce((s,p)=>s+(p.montant||0),0);

  const save=async()=>{
    if(!form.eleve_id||!form.montant)return;setLoading(true);
    const el=data.eleves.find(e=>e.id===parseInt(form.eleve_id));
    const created=await ops.addPaiement({...form,eleve_id:parseInt(form.eleve_id),montant:parseFloat(form.montant),eleve_nom:`${el?.prenom} ${el?.nom}`,matricule:el?.matricule});
    setLoading(false);setModal(null);
    if(created)setRecuPret(created);
  };

  // Construit le HTML du reçu (réutilisé pour impression, PDF, aperçu)
  const recuHTML=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);const cl=data.classes.find(c=>c.id===el?.classe_id);
    const annuel=fraisAnnuelEleve(el,etab,cl);const payeTot=totalPayeEleve(p.eleve_id);const resteAn=Math.max(0,annuel-payeTot);
    const payeEch=p.mois?payeEcheance(p.eleve_id,p.mois):0;const partEch=isTranche?(annuel/echeances.length):(parseFloat(cl?.mensualite_classe)||parseFloat(etab.mensualite)||(annuel>0?annuel/echeances.length:0));
    const resteEch=p.mois&&partEch?Math.max(0,partEch-payeEch):null;
    const row=(k,v,hi)=>`<div style="display:flex;justify-content:space-between;padding:3px 0;${hi?"color:#c2410c;font-weight:700":"color:#334155"}"><span style="color:#94a3b8;font-size:10px;text-transform:uppercase;letter-spacing:.3px">${k}</span><span style="font-weight:600">${v}</span></div>`;
    return `<div class="recu">
      <div class="recu-officiel">
        <div class="recu-pays">${etab.pays||"République de Guinée"}</div>
        <div class="recu-devise">${etab.devise_nationale||"Travail · Justice · Solidarité"}</div>
        <div class="recu-minist">${etab.ministere||"Ministère de l'Éducation Nationale et de l'Alphabétisation"}</div>
        ${(etab.ire||etab.dpe)?`<div class="recu-iredpe">${etab.ire?`IRE : ${etab.ire}`:""}${etab.ire&&etab.dpe?" · ":""}${etab.dpe?`DPE : ${etab.dpe}`:""}</div>`:""}
      </div>
      <div class="recu-head">
        ${etab.logo?`<img src="${etab.logo}" class="recu-logo"/>`:`<div class="recu-logo recu-logo-ph">🎓</div>`}
        <div style="flex:1">
          <div style="font-weight:800;font-size:14px;color:#0f172a;line-height:1.1">${etab.nom||""}</div>
          <div style="font-size:9px;color:#64748b">${etab.adresse?etab.adresse+" · ":""}${etab.telephone||""}${etab.codeMEN?" · Code MEN: "+etab.codeMEN:""}</div>
        </div>
        <div class="recu-badge">REÇU</div>
      </div>
      <div class="recu-num"><span>N° <b style="font-family:monospace">${p.recu}</b></span><span>${p.date}</span></div>
      <div class="recu-grid">
        ${row("Élève",`${el?.prenom||""} ${el?.nom||""}`)}
        ${row("Matricule",el?.matricule||"—")}
        ${row("Classe",cl?.nom||"—")}
        ${row("Type",p.type)}
        ${p.moyen?row("Moyen",p.moyen):""}
        ${p.mois?row(isTranche?"Tranche":"Mois",p.mois):""}
      </div>
      <div class="recu-montant"><span>Montant versé</span><b>${fmtMoney(p.montant,devise)}</b></div>
      ${(resteEch!=null||annuel>0)?`<div class="recu-solde">
        ${resteEch!=null?row(`Reste ${p.mois}`,fmtMoney(resteEch,devise),true):""}
        ${annuel>0?row("Reste annuel",fmtMoney(resteAn,devise),true):""}
      </div>`:""}
      <div class="recu-foot"><span>Comptable : ____________</span><span>Cachet & Signature</span></div>
    </div>`;
  };
  const printRecu=(p)=>printHTML(recuHTML(p),`Reçu ${p.recu}`,{compact:true,etab});
  // Texte récapitulatif pour WhatsApp / Mail
  const recuTexte=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);const cl=data.classes.find(c=>c.id===el?.classe_id);
    const annuel=fraisAnnuelEleve(el,etab,cl);const resteAn=Math.max(0,annuel-totalPayeEleve(p.eleve_id));
    return `*${etab.nom||"MonEcole"}* — Reçu ${p.recu}\n`+
      `Élève : ${el?.prenom||""} ${el?.nom||""} (${el?.matricule||""})\n`+
      `Classe : ${cl?.nom||"—"}\n`+
      `Type : ${p.type}${p.mois?" — "+p.mois:""}\n`+
      (p.moyen?`Moyen : ${p.moyen}\n`:"")+
      `Montant versé : ${fmtMoney(p.montant,devise)}\n`+
      (annuel>0?`Reste annuel : ${fmtMoney(resteAn,devise)}\n`:"")+
      `Date : ${p.date}\nMerci.`;
  };
  // Télécharger le reçu en PDF (via la fenêtre d'impression -> Enregistrer en PDF)
  const pdfRecu=(p)=>printHTML(recuHTML(p),`Recu_${p.recu}`,{compact:true,etab});
  const waRecu=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);
    const tel=(el?.telephone||"").replace(/[^0-9]/g,"");
    const txt=encodeURIComponent(recuTexte(p));
    window.open(tel?`https://wa.me/${tel}?text=${txt}`:`https://wa.me/?text=${txt}`,"_blank");
  };
  const mailRecu=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);
    const sujet=encodeURIComponent(`Reçu ${p.recu} — ${etab.nom||"MonEcole"}`);
    const corps=encodeURIComponent(recuTexte(p).replace(/\*/g,""));
    window.open(`mailto:${el?.email||""}?subject=${sujet}&body=${corps}`,"_blank");
  };

  const totalEncaisse=data.paiements.reduce((s,p)=>s+(p.montant||0),0);

  // Vue détail d'un élève
  if(selEleve){
    const el=data.eleves.find(e=>e.id===parseInt(selEleve));
    const cl=data.classes.find(c=>c.id===el?.classe_id);
    const annuel=fraisAnnuelEleve(el,etab,cl);
    const mensuelCl=parseFloat(cl?.mensualite_classe)||0;
    const partEch=isTranche?(annuel>0?annuel/echeances.length:0):(mensuelCl||(annuel>0?annuel/echeances.length:0));
    const payeScol=totalPayeEleve(el.id);
    const insc=fraisInscEleve(el,etab,cl);
    const payeInsc=data.paiements.filter(p=>p.eleve_id===el.id&&p.type==="Frais d'inscription").reduce((s,p)=>s+(p.montant||0),0);
    const resteInsc=Math.max(0,insc-payeInsc);
    const totalDu=annuel+insc;const totalPaye=payeScol+payeInsc;const resteTotal=Math.max(0,totalDu-totalPaye);
    const histo=data.paiements.filter(p=>p.eleve_id===el.id).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    return(
      <div>
        <div style={{display:"flex",gap:9,marginBottom:16,alignItems:"center"}}>
          <Btn ch={t("pa_retour")} v="ghost" onClick={()=>setSelEleve("")}/>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:16,color:"var(--me-text)"}}>{el.prenom} {el.nom}</div><div style={{fontSize:12,color:"var(--me-text-3)"}}>{txt(cl?.nom,cl?.nom_ar)} · {el.matricule}</div></div>
          <Btn ch={t("pa_encaisser")} v="primary" onClick={()=>{setForm({eleve_id:el.id,type:"Scolarité",montant:"",date:TODAY,mois:echeances[0]||"",note:""});setModal("add");}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
          <Card s={{padding:16}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("pa_total_du")}</div><div style={{fontSize:20,fontWeight:900,color:"var(--me-text)"}}>{fmtMoney(totalDu,devise)}</div></Card>
          <Card s={{padding:16}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("pa_paye")}</div><div style={{fontSize:20,fontWeight:900,color:"#059669"}}>{fmtMoney(totalPaye,devise)}</div></Card>
          <Card s={{padding:16}}><div style={{fontSize:10,color:"var(--me-text-3)",fontWeight:700,textTransform:"uppercase"}}>{t("pa_reste_total")}</div><div style={{fontSize:20,fontWeight:900,color:resteTotal>0?"#c2410c":"#059669"}}>{fmtMoney(resteTotal,devise)}</div></Card>
        </div>
        {insc>0&&<Card s={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:800,fontSize:13,color:"var(--me-text)"}}>🎫 {t("pa_frais_insc")} {resteInsc===0&&<span style={{color:"#059669",fontSize:11}}>{t("pa_regle")}</span>}</div>
              <div style={{fontSize:12,color:"var(--me-text-2)",marginTop:3}}>{t("pa_paye")} {fmtMoney(payeInsc,devise)} / {fmtMoney(insc,devise)}{resteInsc>0&&<span style={{color:"#c2410c"}}> · {t("pa_reste")} {fmtMoney(resteInsc,devise)}</span>}</div>
            </div>
            {resteInsc>0&&<Btn ch={t("pa_payer_insc")} v="ghost" s={{padding:"6px 13px",fontSize:11}} onClick={()=>{setForm({eleve_id:el.id,type:"Frais d'inscription",montant:resteInsc||"",date:TODAY,mois:"",note:""});setModal("add");}}/>}
          </div>
        </Card>}
        <Card s={{marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:13,color:"var(--me-text)",marginBottom:12}}>📅 {t("pa_suivi_par")} {isTranche?t("pa_tranche"):t("pa_mois")}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {echeances.map(ech=>{
              const paye=payeEcheance(el.id,ech);const reste=partEch?Math.max(0,partEch-paye):0;const pct=partEch?Math.min(100,Math.round(paye/partEch*100)):0;
              const solde=partEch>0&&paye>=partEch;
              return(<div key={ech} style={{border:"1px solid #f1f5f9",borderRadius:10,padding:"10px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{ech} {solde&&<span style={{color:"#059669",fontSize:11}}>{t("pa_solde")}</span>}</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:12,color:"var(--me-text-2)"}}>{fmtMoney(paye,devise)}{partEch?` / ${fmtMoney(partEch,devise)}`:""}</span>
                    <Btn ch={t("pa_payer")} v="ghost" s={{padding:"5px 12px",fontSize:11}} onClick={()=>{setForm({eleve_id:el.id,type:"Scolarité",montant:reste||"",date:TODAY,mois:ech,note:""});setModal("add");}}/>
                  </div>
                </div>
                {partEch>0&&<div style={{height:7,background:"var(--me-surface-2,#f1f5f9)",borderRadius:5,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:solde?"#10b981":"#1a56db",transition:"width .3s"}}/></div>}
                {partEch>0&&reste>0&&<div style={{fontSize:11,color:"#c2410c",marginTop:4}}>{t("pa_reste")} : {fmtMoney(reste,devise)}</div>}
              </div>);
            })}
          </div>
        </Card>
        <Card>
          <div style={{fontWeight:800,fontSize:13,color:"var(--me-text)",marginBottom:12}}>🧾 {t("pa_histo")}</div>
          {histo.length===0?<Empty icon="💰" text={t("pa_aucun_versement")}/>:(
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:"var(--me-surface-2,#f8fafc)"}}>{[t("pa_th_recu"),t("pa_th_type"),isTranche?t("pa_th_tranche"):t("pa_th_mois"),t("pa_th_montant"),t("pa_th_date"),""].map((h,hi)=><th key={hi} style={{padding:"8px 11px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--me-text-3)",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
              <tbody>{histo.map(p=>(<tr key={p.id} style={{borderTop:"1px solid #f8fafc"}}>
                <td style={{padding:"8px 11px",fontFamily:"monospace",fontSize:12,fontWeight:700}}>{p.recu}</td>
                <td style={{padding:"8px 11px",fontSize:12}}>{p.type}</td>
                <td style={{padding:"8px 11px",fontSize:12,color:"var(--me-text-2)"}}>{p.mois||"—"}</td>
                <td style={{padding:"8px 11px",fontSize:13,fontWeight:700,color:"#059669"}}>{fmtMoney(p.montant,devise)}</td>
                <td style={{padding:"8px 11px",fontSize:12,color:"var(--me-text-2)"}}>{p.date}</td>
                <td style={{padding:"8px 11px"}}><div style={{display:"flex",gap:6}}>
                  <button onClick={()=>printRecu(p)} style={{background:"rgba(26,86,219,0.12)",color:"#1a56db",border:"none",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>🖨️</button>
                  <button onClick={()=>ops.deletePaiement(p.id)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>{t("btn_supprimer")}</button>
                </div></td>
              </tr>))}</tbody>
            </table>
          )}
        </Card>
        {modal&&<PaiementModal {...{form,setForm,echeances,isTranche,devise,loading,save,setModal,moyens:etab.moyens_paiement||[]}}/>}
        {recuPret&&<RecuApercu html={recuHTML(recuPret)} onClose={()=>setRecuPret(null)} onPrint={()=>printRecu(recuPret)} onPdf={()=>pdfRecu(recuPret)} onWa={()=>waRecu(recuPret)} onMail={()=>mailRecu(recuPret)}/>}
      </div>
    );
  }

  // Vue liste groupée par cycle et classe
  const ligneEleve=(el)=>{
    const cl=data.classes.find(c=>c.id===el.classe_id);
    const insc=fraisInscEleve(el,etab,cl);
    const payeInsc=data.paiements.filter(p=>p.eleve_id===el.id&&p.type==="Frais d'inscription").reduce((s,p)=>s+(p.montant||0),0);
    const annuel=fraisAnnuelEleve(el,etab,cl)+insc;const paye=totalPayeEleve(el.id)+payeInsc;const reste=Math.max(0,annuel-paye);
    const solde=annuel>0&&paye>=annuel;const pct=annuel?Math.min(100,Math.round(paye/annuel*100)):0;

function Presences({data,ops,etab}) {

  const absents=eleves.filter(e=>!getP(e.id));

  const moisRows=Object.keys(moisMap).filter(mk=>moisMap[mk].abs>0).sort().reverse().map(mk=>{const m=moisMap[mk];const [y,mo]=mk.split("-");let label=mk;try{label=new Date(parseInt(y),parseInt(mo)-1,1).toLocaleDateString(CURRENT_LANG==="ar"?"ar":"fr-FR",{month:"long",year:"numeric"});}catch(_){}return {mk,label,abs:m.abs,taux:m.tot?Math.round(m.abs/m.tot*100):0,pctF:m.abs?Math.round(m.absF/m.abs*100):0};});
  const totAbs=moisRows.reduce((s,r)=>s+r.abs,0);
  const totRecs=Object.values(moisMap).reduce((s,m)=>s+m.tot,0);
  const totAbsF=Object.values(moisMap).reduce((s,m)=>s+m.absF,0);

        </div>
        {eleves.length>0&&<div style={{display:"flex",gap:14,padding:"9px 13px",background:"var(--me-surface-2,#f8fafc)",borderRadius:9,marginTop:8}}>
          <span style={{fontSize:12,color:"#059669",fontWeight:700}}>{t("pr_presents")} : {eleves.length-absents.length}</span>
          <span style={{fontSize:12,color:"#dc2626",fontWeight:700}}>{t("pr_absents")} : {absents.length}</span>
        </div>}
      </Card>
      {eleves.length===0?<Card><Empty icon="📅" text={t("pr_select_classe")}/></Card>:(
        <Card s={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)",marginBottom:11}}>{t("pr_feuille_du")} {date}</div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:11}}>

function Messagerie({data,ops,currentUser}) {

  const autres=(data.utilisateurs||[]).filter(u=>u.id!==me.id);
