  const dmKey=(a,b)=>"dm:"+[a,b].sort((x,y)=>x-y).join("-");
  const groupes=(data.conversations||[]).filter(g=>Array.isArray(g.membres)&&(g.membres.includes(me.id)||me.role==="Administrateur"));
  const [active,setActive]=useState("general");
  const [msg,setMsg]=useState("");
  const [modalGroupe,setModalGroupe]=useState(false);
  const [grpNom,setGrpNom]=useState("");const [grpMembres,setGrpMembres]=useState([]);
  const [newDm,setNewDm]=useState(false);
  const [pending,setPending]=useState([]); // fichiers sélectionnés à envoyer
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef(null);
  const endRef=useRef(null);
  // ── Message vocal ──
  const [recording,setRecording]=useState(false);
  const [recSecs,setRecSecs]=useState(0);
  const recRef=useRef(null);const chunksRef=useRef([]);const recTimerRef=useRef(null);const streamRef=useRef(null);const recStartRef=useRef(0);const sendOnStopRef=useRef(false);const msgRef=useRef("");
  useEffect(()=>{msgRef.current=msg;},[msg]);
  const fmtSecs=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const pickMime=()=>{const cands=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];if(window.MediaRecorder&&MediaRecorder.isTypeSupported){for(const c of cands){if(MediaRecorder.isTypeSupported(c))return c;}}return "";};
  const cleanupStream=()=>{try{streamRef.current&&streamRef.current.getTracks().forEach(tr=>tr.stop());}catch(_){}streamRef.current=null;};
  const startRec=async()=>{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){alert(t("msg_voc_non_supporte"));return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      const mime=pickMime();
      const mr=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data&&e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        const type=mr.mimeType||mime||"audio/webm";
        const blob=new Blob(chunksRef.current,{type});
        cleanupStream();
        const duree=Math.max(1,Math.round((Date.now()-recStartRef.current)/1000));
        const doSend=sendOnStopRef.current;sendOnStopRef.current=false;
        if(blob.size>0){
          const ext=type.includes("mp4")?"m4a":type.includes("ogg")?"ogg":"webm";
          const file=new File([blob],`vocal-${Date.now()}.${ext}`,{type});
          setUploading(true);const r=await ops.uploadFichier(file);setUploading(false);
          if(r){r.duree=duree;
            if(doSend){ops.sendMessage(myName,me.role,(msgRef.current||"").trim(),active,me.id,[r]);setMsg("");}
            else setPending(p=>[...p,r]);
          }
        }
      };
      recStartRef.current=Date.now();
      mr.start();recRef.current=mr;setRecording(true);setRecSecs(0);
      recTimerRef.current=setInterval(()=>setRecSecs(s=>s+1),1000);
    }catch(e){cleanupStream();alert(t("msg_voc_acces")+" "+(e.message||""));}
  };
  const stopRec=()=>{if(recTimerRef.current){clearInterval(recTimerRef.current);recTimerRef.current=null;}if(recRef.current&&recRef.current.state!=="inactive"){recRef.current.stop();}setRecording(false);};
  const stopAndSend=()=>{sendOnStopRef.current=true;stopRec();};
  const cancelRec=()=>{if(recTimerRef.current){clearInterval(recTimerRef.current);recTimerRef.current=null;}if(recRef.current){recRef.current.onstop=null;if(recRef.current.state!=="inactive")recRef.current.stop();}cleanupStream();chunksRef.current=[];setRecording(false);setRecSecs(0);};
  useEffect(()=>{if(recording&&recSecs>=120)stopAndSend();},[recSecs,recording]);
  useEffect(()=>()=>{if(recTimerRef.current)clearInterval(recTimerRef.current);cleanupStream();},[]);

  // Messages de la conversation active
  const msgs=(data.messages||[]).filter(m=>(m.conversation||"general")===active);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[data.messages,active]);
  const fmtTime=(d)=>{try{return new Date(d).toLocaleTimeString(CURRENT_LANG==="ar"?"ar":"fr-FR",{hour:"2-digit",minute:"2-digit"});}catch(_){return "";}};
  const convOthers=(conv)=>{
    if(conv==="general")return autres.map(u=>u.id);
    if(conv.startsWith("group:")){const g=groupes.find(x=>"group:"+x.id===conv);return (g?.membres||[]).filter(id=>id!==me.id);}
    if(conv.startsWith("dm:")){const ids=conv.slice(3).split("-").map(Number);return ids.filter(i=>i!==me.id);}
    return [];
  };
  // Marquer comme lus les messages reçus de la conversation active
  useEffect(()=>{
    if(!me.id)return;
    const toMark=(data.messages||[]).filter(m=>(m.conversation||"general")===active&&m.auteur_id&&m.auteur_id!==me.id&&!(Array.isArray(m.lu_par)&&m.lu_par.includes(me.id)));
    if(toMark.length)ops.markRead(toMark.map(m=>({id:m.id,lu_par:[...(Array.isArray(m.lu_par)?m.lu_par:[]),me.id]})));
  },[active,data.messages]);

  const pickFiles=async(e)=>{
    const files=Array.from(e.target.files||[]);
    if(files.length===0)return;
    const trop=files.find(f=>f.size>15*1024*1024);
    if(trop){alert(t("msg_too_big")+" "+trop.name);return;}
    setUploading(true);
    const ups=[];
    for(const f of files){const r=await ops.uploadFichier(f);if(r)ups.push(r);}
    setPending(p=>[...p,...ups]);setUploading(false);
    if(fileRef.current)fileRef.current.value="";
  };
  const send=()=>{if(!msg.trim()&&pending.length===0)return;ops.sendMessage(myName,me.role,msg.trim(),active,me.id,pending);setMsg("");setPending([]);};
  const toggleMembre=id=>setGrpMembres(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const creerGroupe=async()=>{
    if(!grpNom.trim()||grpMembres.length===0)return;
    const membres=[...new Set([...grpMembres,me.id])];
    const g=await ops.addGroupe(grpNom.trim(),membres);
    if(g){setModalGroupe(false);setGrpNom("");setGrpMembres([]);setActive("group:"+g.id);}
  };

  // Titre de la conversation active
  const activeTitle=(()=>{
    if(active==="general")return t("msg_general_full");
    if(active.startsWith("group:")){const g=groupes.find(x=>"group:"+x.id===active);return "👥 "+(g?.nom||t("msg_groupe"));}
    if(active.startsWith("dm:")){const ids=active.slice(3).split("-").map(Number);const other=ids.find(i=>i!==me.id);const u=(data.utilisateurs||[]).find(x=>x.id===other);return "👤 "+(u?`${u.prenom} ${u.nom}`:t("msg_prive"));}
    return t("msg_conversation");
  })();

  const ConvBtn=({id,label,sub,active:act,onClick})=>(
    <button onClick={onClick} className="me-nav" style={{width:"100%",textAlign:"left",padding:"10px 12px",borderRadius:10,border:"none",cursor:"pointer",background:act?"#eff6ff":"transparent",marginBottom:3,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
      <div style={{fontWeight:700,fontSize:12.5,color:act?"#1a56db":"var(--me-text)"}}>{label}</div>
      {sub&&<div style={{fontSize:10.5,color:"var(--me-text-3)",marginTop:1}}>{sub}</div>}
    </button>
  );

  return(
    <div>
      <SHdr title={t("nav_messagerie")+" 💬"} sub={t("msg_sub")} action={<Btn ch={t("btn_new_groupe")} v="primary" onClick={()=>{setGrpNom("");setGrpMembres([]);setModalGroupe(true);}}/>}/>
      <div className="me-msg-grid" style={{display:"grid",gridTemplateColumns:"230px 1fr",gap:14,height:500}}>
        {/* Liste des conversations */}
        <Card s={{padding:10,overflowY:"auto"}}>
          <div style={{fontSize:10,fontWeight:800,color:"var(--me-text-3)",textTransform:"uppercase",padding:"4px 8px 8px"}}>{t("msg_canaux")}</div>
          <ConvBtn label={t("msg_general")} sub={t("msg_tout_le_monde")} active={active==="general"} onClick={()=>setActive("general")}/>
          {groupes.length>0&&<div style={{fontSize:10,fontWeight:800,color:"var(--me-text-3)",textTransform:"uppercase",padding:"10px 8px 6px"}}>{t("msg_groupes")}</div>}
          {groupes.map(g=>(
            <ConvBtn key={g.id} label={"👥 "+g.nom} sub={`${(g.membres||[]).length} ${t("msg_membres")}`} active={active==="group:"+g.id} onClick={()=>setActive("group:"+g.id)}/>
          ))}
          <div style={{fontSize:10,fontWeight:800,color:"var(--me-text-3)",textTransform:"uppercase",padding:"10px 8px 6px"}}>{t("msg_prives")}</div>
          {autres.length===0?<div style={{fontSize:11,color:"#cbd5e1",padding:"4px 8px"}}>{t("msg_aucun_autre")}</div>:autres.map(u=>(
            <ConvBtn key={u.id} label={"👤 "+u.prenom+" "+u.nom} sub={u.role} active={active===dmKey(me.id,u.id)} onClick={()=>setActive(dmKey(me.id,u.id))}/>
          ))}
        </Card>

        {/* Zone de chat */}
        <Card s={{display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",fontWeight:800,fontSize:13,color:"var(--me-text)"}}>{activeTitle}</div>
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {msgs.length===0?<div style={{textAlign:"center",color:"var(--me-text-3)",padding:"40px 0"}}><div style={{fontSize:32}}>💬</div><p style={{fontSize:13}}>{t("msg_aucun_message")}</p></div>:
            msgs.map(m=>{const mine=m.auteur===myName;const fichiers=Array.isArray(m.fichiers)?m.fichiers:[];
              const others=mine?convOthers(active):[];const readers=mine?(Array.isArray(m.lu_par)?m.lu_par.filter(id=>others.includes(id)):[]):[];
              const someRead=mine&&readers.length>0;const allRead=mine&&others.length>0&&readers.length>=others.length;const isDm=active.startsWith("dm:");
              let status="";if(mine&&m.auteur_id){status=!someRead?"✓":((isDm||allRead)?"✓✓":"✓✓ "+readers.length);}
              return(
              <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start"}}>
                {!mine&&<div style={{fontSize:10,color:"var(--me-text-3)",marginBottom:3}}>{m.auteur} · <Badge role={m.role}/></div>}
                {m.texte&&<div style={{maxWidth:"72%",background:mine?"linear-gradient(135deg,#1a56db,#1e40af)":"#f1f5f9",color:mine?"#fff":"#0f172a",borderRadius:mine?"15px 15px 5px 15px":"15px 15px 15px 5px",padding:"9px 13px",fontSize:13,lineHeight:1.5,boxShadow:mine?"0 3px 10px -3px rgba(26,86,219,.5)":"none"}}>{m.texte}</div>}
                {fichiers.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:m.texte?5:0,justifyContent:mine?"flex-end":"flex-start",maxWidth:"72%"}}>
                  {fichiers.map((f,k)=>{const isImg=(f.type||"").startsWith("image/");const isAudio=(f.type||"").startsWith("audio/");return isAudio?(
                    <div key={k} style={{display:"flex",alignItems:"center",gap:9,background:"var(--me-surface,#fff)",border:"1px solid #e2e8f0",borderRadius:12,padding:"8px 11px",minWidth:210}}>
                      <span style={{fontSize:18}}>🎤</span>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#1a56db"}}>{t("msg_voc")}{f.duree?` · ${fmtSecs(f.duree)}`:""}</span>
                        <audio controls src={f.url} style={{height:34,maxWidth:220}}/>
                      </div>
                    </div>
                  ):isImg?(
                    <a key={k} href={f.url} target="_blank" rel="noreferrer"><img src={f.url} alt={f.nom} style={{maxWidth:160,maxHeight:160,borderRadius:11,border:"1px solid #e2e8f0",display:"block"}}/></a>
                  ):(
                    <a key={k} href={f.url} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"var(--me-surface,#fff)",border:"1px solid #e2e8f0",borderRadius:10,padding:"8px 12px",textDecoration:"none",color:"#1a56db",fontSize:12,fontWeight:700,maxWidth:200}}>📎 <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.nom}</span></a>
                  );})}
                </div>}
                <div style={{fontSize:10,color:"var(--me-text-3)",marginTop:3,display:"flex",gap:5,alignItems:"center",justifyContent:mine?"flex-end":"flex-start"}}>
                  <span>{fmtTime(m.created_at)}</span>
                  {mine&&status&&<span style={{fontWeight:800,color:someRead?"#1a56db":"#94a3b8"}}>{status}</span>}
                </div>
              </div>
            );})}
            <div ref={endRef}/>
          </div>
          <div style={{borderTop:"1px solid #f1f5f9"}}>
            {pending.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:7,padding:"10px 15px 0"}}>
              {pending.map((f,k)=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(26,86,219,0.12)",border:"1px solid #bfdbfe",borderRadius:9,padding:"4px 6px 4px 10px",fontSize:11,fontWeight:600,color:"#1a56db",maxWidth:160}}>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(f.type||"").startsWith("audio/")?`🎤 ${t("msg_voc")}${f.duree?` ${fmtSecs(f.duree)}`:""}`:`${(f.type||"").startsWith("image/")?"🖼️":"📎"} ${f.nom}`}</span>
                  <button onClick={()=>setPending(p=>p.filter((_,j)=>j!==k))} style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:12,fontWeight:800}}>✕</button>
                </div>
              ))}
            </div>}
            {recording?(
              <div style={{padding:"12px 15px",display:"flex",gap:10,alignItems:"center"}}>
                <span style={{display:"flex",alignItems:"center",gap:9,flex:1,color:"#dc2626",fontWeight:700,fontSize:13}}>
                  <span style={{width:11,height:11,borderRadius:"50%",background:"#dc2626",display:"inline-block"}}/>
                  {t("msg_voc_enr")} {fmtSecs(recSecs)}
                </span>
                <button className="me-btn" onClick={cancelRec} title={t("btn_annuler")} style={{padding:"10px 13px",borderRadius:11,border:"1.5px solid #e2e8f0",background:"var(--me-surface,#fff)",color:"#dc2626",cursor:"pointer",fontSize:14,fontWeight:800}}>✕</button>
                <button className="me-btn" onClick={stopAndSend} disabled={uploading} title={t("msg_voc_envoyer")} style={{padding:"10px 18px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#1a56db,#1e40af)",color:"#fff",cursor:uploading?"not-allowed":"pointer",fontSize:13,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",opacity:uploading?0.6:1}}>{uploading?"⏳":"➤ "+t("msg_voc_envoyer")}</button>
              </div>
            ):(
            <div style={{padding:"12px 15px",display:"flex",gap:9,alignItems:"center"}}>
              <input ref={fileRef} type="file" multiple onChange={pickFiles} style={{display:"none"}}/>
              <button className="me-btn" onClick={()=>fileRef.current?.click()} disabled={uploading} title={t("msg_joindre")} style={{padding:"10px 13px",borderRadius:11,border:"1.5px solid #e2e8f0",background:"var(--me-surface,#fff)",cursor:"pointer",fontSize:16}}>{uploading?"⏳":"📎"}</button>
              <button className="me-btn" onClick={startRec} disabled={uploading} title={t("msg_voc")} style={{padding:"10px 13px",borderRadius:11,border:"1.5px solid #e2e8f0",background:"var(--me-surface,#fff)",cursor:"pointer",fontSize:16}}>🎤</button>
              <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={t("msg_ecrire_ph")} style={{flex:1,padding:"10px 14px",borderRadius:11,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
              <button className="me-btn" onClick={send} disabled={(!msg.trim()&&pending.length===0)||uploading} style={{padding:"10px 18px",borderRadius:11,border:"none",background:(msg.trim()||pending.length)?"linear-gradient(135deg,#1a56db,#1e40af)":"#e2e8f0",color:(msg.trim()||pending.length)?"#fff":"#94a3b8",fontSize:14,fontWeight:700,cursor:(msg.trim()||pending.length)?"pointer":"not-allowed",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>→</button>
            </div>
            )}
          </div>
        </Card>
      </div>

      {modalGroupe&&<Modal title={t("msg_creer_groupe")} onClose={()=>setModalGroupe(false)}>
        <Inp label={t("msg_nom_groupe")} value={grpNom} onChange={e=>setGrpNom(e.target.value)} placeholder={t("msg_nom_groupe_ph")}/>
        <Lbl t={t("msg_membres_groupe")}>
          {autres.length===0?<div style={{fontSize:12,color:"var(--me-text-3)"}}>{t("msg_aucun_a_ajouter")}</div>:(
            <div style={{display:"flex",flexWrap:"wrap",gap:7,maxHeight:200,overflowY:"auto"}}>
              {autres.map(u=>{const on=grpMembres.includes(u.id);return(
                <button key={u.id} type="button" onClick={()=>toggleMembre(u.id)} style={{padding:"6px 12px",borderRadius:20,border:on?"2px solid #1a56db":"1.5px solid #e2e8f0",background:on?"#eff6ff":"#fff",color:on?"#1a56db":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{on?"✓ ":""}{u.prenom} {u.nom}</button>
              );})}
            </div>
          )}
          <div style={{fontSize:11,color:"var(--me-text-3)",marginTop:6}}>{t("msg_auto_ajout")}</div>
        </Lbl>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModalGroupe(false)}/><Btn ch={t("msg_creer_btn")} v="success" onClick={creerGroupe} disabled={!grpNom.trim()||grpMembres.length===0}/></div>
      </Modal>}
    </div>
  );
}

// ── UTILISATEURS ──────────────────────────────────────────────────────────────
function Utilisateurs({data,ops,currentUser,etab={}}) {
  const roleBase=(role)=>navForRole(role).map(n=>n.id).filter(id=>id!=="dashboard");
  const [modal,setModal]=useState(null);const [form,setForm]=useState({nom:"",prenom:"",genre:"",identifiant:"",password:"",role:"Professeur",matieres_autorisees:[],classes_autorisees:[],pages_autorisees:roleBase("Professeur")});const [loading,setLoading]=useState(false);const [err,setErr]=useState("");
  const toggleMat=id=>setForm(f=>({...f,matieres_autorisees:(f.matieres_autorisees||[]).includes(id)?f.matieres_autorisees.filter(x=>x!==id):[...(f.matieres_autorisees||[]),id]}));
  const toggleClasse=id=>setForm(f=>({...f,classes_autorisees:(f.classes_autorisees||[]).includes(id)?f.classes_autorisees.filter(x=>x!==id):[...(f.classes_autorisees||[]),id]}));
  const togglePage=id=>setForm(f=>({...f,pages_autorisees:(f.pages_autorisees||[]).includes(id)?f.pages_autorisees.filter(x=>x!==id):[...(f.pages_autorisees||[]),id]}));
  // Pages accessibles d'un utilisateur (pour l'aperçu dans la liste)
  const accessOf=(u)=>{const ids=u.role==="Administrateur"?NAV.map(n=>n.id):((Array.isArray(u.pages_autorisees)&&u.pages_autorisees.length)?["dashboard",...u.pages_autorisees]:navForRole(u.role).map(n=>n.id));return NAV.filter(n=>ids.includes(n.id));};
  const save=async()=>{if(!form.nom||!form.identifiant)return;setErr("");
    if(form.role==="Administrateur"){const adminMax=adminLimitOf(etab);const autres=(data.utilisateurs||[]).filter(u=>u.role==="Administrateur"&&u.id!==modal).length;if(autres>=adminMax){setErr(t("us_admin_limit").replace("{f}",formuleLabel(etab)||"—").replace("{n}",adminMax===Infinity?"∞":adminMax));return;}}
    setLoading(true);const payload={nom:form.nom,prenom:form.prenom,genre:form.genre,identifiant:form.identifiant,role:form.role,matieres_autorisees:form.role==="Professeur"?(form.matieres_autorisees||[]):[],classes_autorisees:form.role==="Professeur"?(form.classes_autorisees||[]):[],pages_autorisees:form.role==="Administrateur"?[]:(form.pages_autorisees||[])};if(modal==="add")await ops.addUser({...payload,password:form.password});else await ops.updateUser(modal,{...payload,...(form.password?{password:form.password}:{})});setLoading(false);setModal(null);};
  return(
    <div>
      <SHdr title={t("nav_utilisateurs")+" 👤"} sub={t("us_sub")} action={currentUser.role==="Administrateur"?<Btn ch={t("btn_new_user")} v="primary" onClick={()=>{setForm({nom:"",prenom:"",genre:"",identifiant:"",password:"",role:"Professeur",matieres_autorisees:[],classes_autorisees:[],pages_autorisees:roleBase("Professeur")});setModal("add");}}/>:null}/>
      <Tbl cols={[t("us_th_user"),t("us_th_ident"),t("us_th_role"),t("us_th_actions")]} empty={<Empty icon="👤" text={t("us_empty")}/>}
        rows={data.utilisateurs.map(u=>(
          <TR key={u.id}>
            <TD><div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:32,height:32,borderRadius:9,background:(ROLE_CLR[u.role]||"#6b7280")+"20",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:ROLE_CLR[u.role]||"#6b7280",fontSize:11}}>{u.prenom?.[0]}{u.nom[0]}</div><div><div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{u.prenom} {u.nom}{u.fondateur&&<span style={{marginLeft:6,fontSize:9,fontWeight:800,color:"#b45309",background:"rgba(217,119,6,0.14)",padding:"1px 6px",borderRadius:20,verticalAlign:"middle"}}>{t("us_fondateur")}</span>}</div><div style={{fontSize:10.5,color:"var(--me-text-3)",marginTop:2,lineHeight:1.35}}>{accessOf(u).map(n=>t("nav_"+n.id)).join(" · ")}</div></div></div></TD>
            <TD mono>{u.identifiant}</TD>
            <TD><Badge role={u.role}/></TD>
            <TD>{currentUser.role==="Administrateur"&&((u.fondateur&&u.id!==currentUser.id)?<span style={{fontSize:11,fontWeight:700,color:"var(--me-text-3)",display:"inline-flex",alignItems:"center",gap:5}}>🔒 {t("us_fondateur")}</span>:<div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setForm({nom:u.nom,prenom:u.prenom||"",genre:u.genre||"",identifiant:u.identifiant,password:"",role:u.role,matieres_autorisees:Array.isArray(u.matieres_autorisees)?u.matieres_autorisees:[],classes_autorisees:Array.isArray(u.classes_autorisees)?u.classes_autorisees:[],pages_autorisees:(Array.isArray(u.pages_autorisees)&&u.pages_autorisees.length)?u.pages_autorisees:roleBase(u.role)});setModal(u.id);}} style={{background:"var(--me-surface-2,#f1f5f9)",color:"var(--me-text-2)",border:"none",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:11.5,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_modifier")}</button>
              {u.id!==currentUser.id&&!u.fondateur&&<button onClick={()=>ops.deleteUser(u.id)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:11.5,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_supprimer")}</button>}
            </div>)}</TD>
          </TR>
        ))}
      />

// ── DÉPENSES ──────────────────────────────────────────────────────────────────
function Depenses({data,ops,etab}) {
  const devise=etab.devise||"GNF";
  const CATS=["Matériel","Fournitures","Salaires","Loyer","Électricité/Eau","Maintenance","Transport","Communication","Taxes","Autre"];
  const CAT_AR={"Matériel":"معدات","Fournitures":"لوازم","Salaires":"رواتب","Loyer":"إيجار","Électricité/Eau":"كهرباء/ماء","Maintenance":"صيانة","Transport":"نقل","Communication":"اتصالات","Taxes":"ضرائب","Autre":"أخرى"};
  const catLabel=c=>CURRENT_LANG==="ar"?(CAT_AR[c]||c):c;
  const moyens=(etab.moyens_paiement&&etab.moyens_paiement.length)?etab.moyens_paiement:["Espèces","Orange Money","MoMo","Carte Visa","Chèque"];
  const blank={date:TODAY,categorie:"Matériel",libelle:"",montant:"",fournisseur:"",mode_paiement:moyens[0]||"Espèces",note:""};
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState(blank);
  const [loading,setLoading]=useState(false);
  const [mois,setMois]=useState("");
  const [cat,setCat]=useState("");
  const deps=data.depenses||[];
  const filtered=deps.filter(d=>(!mois||(d.date||"").slice(0,7)===mois)&&(!cat||d.categorie===cat));
  const total=filtered.reduce((s,d)=>s+(Number(d.montant)||0),0);
  const encaisse=(data.paiements||[]).filter(p=>!mois||(p.date||"").slice(0,7)===mois).reduce((s,p)=>s+(Number(p.montant)||0),0);
  const solde=encaisse-total;
  const moisDispo=[...new Set(deps.map(d=>(d.date||"").slice(0,7)).filter(Boolean))].sort().reverse();
  const parCat=CATS.map(c=>({c,montant:filtered.filter(d=>d.categorie===c).reduce((s,d)=>s+(Number(d.montant)||0),0)})).filter(x=>x.montant>0).sort((a,b)=>b.montant-a.montant);
  const save=async()=>{
    if(!form.libelle||!form.montant)return;
    setLoading(true);
    const payload={date:form.date||TODAY,categorie:form.categorie,libelle:form.libelle,montant:parseFloat(form.montant)||0,fournisseur:form.fournisseur,mode_paiement:form.mode_paiement,note:form.note};
    if(modal==="add")await ops.addDepense(payload);else await ops.updateDepense(modal,payload);
    setLoading(false);setModal(null);
  };
  const openNew=()=>{setForm(blank);setModal("add");};
  const openEdit=(d)=>{setForm({date:d.date||TODAY,categorie:d.categorie||"Matériel",libelle:d.libelle||"",montant:d.montant??"",fournisseur:d.fournisseur||"",mode_paiement:d.mode_paiement||moyens[0]||"Espèces",note:d.note||""});setModal(d.id);};
  return(
    <div>
      <SHdr title={t("nav_depenses")+" 💸"} sub={t("dp_sub")} action={<div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
        <ExportBar name="depenses" title={t("nav_depenses")} getRows={()=>filtered.map(d=>({Date:d.date||"","Catégorie":catLabel(d.categorie),"Libellé":d.libelle||"",Montant:d.montant||0,Fournisseur:d.fournisseur||"",Moyen:d.mode_paiement||"",Note:d.note||""}))}/>
        <Btn ch={t("dp_new")} v="primary" onClick={openNew}/>
      </div>}/>
      <div style={{display:"flex",gap:13,marginBottom:16,flexWrap:"wrap"}}>
        <StatCard icon="💸" label={t("dp_total")} value={fmtMoney(total,devise)} color="#dc2626"/>
        <StatCard icon="💰" label={t("dp_encaisse")} value={fmtMoney(encaisse,devise)} color="#059669"/>
        <StatCard icon="⚖️" label={t("dp_solde")} value={fmtMoney(solde,devise)} color={solde>=0?"#1a56db":"#dc2626"}/>
      </div>
      <Card s={{marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
          <Slt label={t("dp_mois")} value={mois} onChange={e=>setMois(e.target.value)} opts={[{v:"",l:t("dp_tous_mois")},...moisDispo.map(m=>({v:m,l:m}))]}/>
          <Slt label={t("dp_categorie")} value={cat} onChange={e=>setCat(e.target.value)} opts={[{v:"",l:t("dp_toutes_cats")},...CATS.map(c=>({v:c,l:catLabel(c)}))]}/>
        </div>
        {parCat.length>0&&<div style={{marginTop:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--me-text-2)",marginBottom:8}}>{t("dp_repartition")}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {parCat.map(x=>{const pct=total?Math.round(x.montant/total*100):0;return(
              <div key={x.c} style={{display:"flex",alignItems:"center",gap:9}}>
                <div style={{width:120,fontSize:12,color:"var(--me-text)",fontWeight:600}}>{catLabel(x.c)}</div>
                <div style={{flex:1,height:8,background:"var(--me-surface-2,#f1f5f9)",borderRadius:5,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:"#1a56db"}}/></div>
                <div style={{width:130,textAlign:"right",fontSize:12,fontWeight:700,color:"var(--me-text)"}}>{fmtMoney(x.montant,devise)}</div>
              </div>
            );})}
          </div>
        </div>}
      </Card>
      {filtered.length===0?<Card><Empty icon="💸" text={t("dp_empty")}/></Card>:(
        <Card s={{padding:0,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:640}}>
              <thead><tr style={{background:"var(--me-surface-2,#f8fafc)"}}>{[t("dp_date"),t("dp_categorie"),t("dp_libelle"),t("dp_fournisseur"),t("dp_montant"),""].map((h,hi)=><th key={hi} style={{padding:"10px 13px",textAlign:hi===4?"right":"left",fontSize:10,fontWeight:700,color:"var(--me-text-3)",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
              <tbody>{filtered.map((d,i)=>(
                <tr key={d.id} style={{borderTop:i>0?"1px solid #f8fafc":"none"}}>
                  <td style={{padding:"10px 13px",fontSize:12,color:"var(--me-text-2)",whiteSpace:"nowrap"}}>{d.date}</td>
                  <td style={{padding:"10px 13px"}}><span style={{background:"rgba(26,86,219,0.12)",color:"#1a56db",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700}}>{catLabel(d.categorie)}</span></td>
                  <td style={{padding:"10px 13px",fontSize:13,fontWeight:600,color:"var(--me-text)"}}>{d.libelle}{d.note?<div style={{fontSize:11,color:"var(--me-text-3)",fontWeight:400}}>{d.note}</div>:null}</td>
                  <td style={{padding:"10px 13px",fontSize:12,color:"var(--me-text-2)"}}>{d.fournisseur||"—"}</td>
                  <td style={{padding:"10px 13px",fontSize:13,fontWeight:800,color:"#dc2626",textAlign:"right",whiteSpace:"nowrap"}}>{fmtMoney(d.montant,devise)}</td>
                  <td style={{padding:"10px 13px",textAlign:"right",whiteSpace:"nowrap"}}><div style={{display:"inline-flex",gap:6}}>
                    <button onClick={()=>openEdit(d)} style={{background:"var(--me-surface-2,#f1f5f9)",color:"var(--me-text-2)",border:"none",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_modifier")}</button>
                    <button onClick={()=>ops.deleteDepense(d.id)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_supprimer")}</button>
                  </div></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </Card>
      )}
      {modal&&<Modal title={modal==="add"?t("dp_new_titre"):t("dp_edit_titre")} onClose={()=>setModal(null)} w={520}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={t("dp_date")} type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
          <Slt label={t("dp_categorie")} value={form.categorie} onChange={e=>setForm(f=>({...f,categorie:e.target.value}))} opts={CATS.map(c=>({v:c,l:catLabel(c)}))}/>
        </div>
        <Inp label={t("dp_libelle")+" *"} value={form.libelle} onChange={e=>setForm(f=>({...f,libelle:e.target.value}))} placeholder={t("dp_libelle_ph")}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={`${t("dp_montant")} (${devise}) *`} type="number" value={form.montant} onChange={e=>setForm(f=>({...f,montant:e.target.value}))}/>
          <Slt label={t("dp_moyen")} value={form.mode_paiement} onChange={e=>setForm(f=>({...f,mode_paiement:e.target.value}))} opts={moyens.map(m=>({v:m,l:m}))}/>
        </div>
        <Inp label={t("dp_fournisseur")} value={form.fournisseur} onChange={e=>setForm(f=>({...f,fournisseur:e.target.value}))}/>
        <Inp label={t("dp_note")} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":t("btn_save")} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

// ── PARAMÈTRES ÉTABLISSEMENT ──────────────────────────────────────────────────
function Parametres({etab,data,ops,onEtabUpdate,currentUser,theme,setTheme,uiZoom,setUiZoom,lang,setLang,notifEnabled,setNotifEnabled,onLogout}) {
  const toggleNotif=async()=>{if(notifEnabled){try{localStorage.setItem("monecole_notifs","0");}catch(_){}setNotifEnabled(false);}else{const ok=await askNotif();setNotifEnabled(ok);if(ok)notify(t("notif_actif_titre"),t("notif_actif_corps"),"monecole-test");else alert(t("notif_refus"));}};
  const [form,setForm]=useState({
    nom:etab.nom||"",nom_ar:etab.nom_ar||"",devise_txt:etab.devise_txt||"",annee:etab.annee||"",devise:etab.devise||"GNF",
    systeme:etab.systeme||"trimestre",periodes:Array.isArray(etab.periodes)?etab.periodes:null,adresse:etab.adresse||"",telephone:etab.telephone||"",email:etab.email||"",
    codeMEN:etab.codeMEN||"",prefixe:etab.prefixe||"",fraisInscription:etab.fraisInscription||"",mensualite:etab.mensualite||"",
    pays:etab.pays||"République de Guinée",devise_nationale:etab.devise_nationale||"Travail · Justice · Solidarité",
    ministere:etab.ministere||"Ministère de l'Éducation Nationale et de l'Alphabétisation",ire:etab.ire||"",dpe:etab.dpe||"",dsee:etab.dsee||"",
    devise_mots:etab.devise_mots||{m1:"",c1:"#dc2626",m2:"",c2:"#d97706",m3:"",c3:"#059669"},
    langue:etab.langue||"fr",
    theme_couleur:etab.theme_couleur||"#1a56db",theme_police:etab.theme_police||"'Segoe UI',Helvetica,Arial,sans-serif",theme_titre_centre:etab.theme_titre_centre!==false,
    signataire_grade:etab.signataire_grade||"Le Directeur",signataire_nom:etab.signataire_nom||"",
    ar:etab.ar||{pays:"جمهورية غينيا",devise:"عمل · عدل · تضامن",ministere:"وزارة التعليم الوطني ومحو الأمية",ire:"",dpe:"",dsee:"",ecole:"",bulletin:"كشف الدرجات",recu:"وصل",classe:"القسم",eleve:"التلميذ",matricule:"رقم التسجيل",annee:"السنة الدراسية"},
    mode_paiement:etab.mode_paiement||"mensualite",nb_tranches:etab.nb_tranches||"3",mois_personnalises:etab.mois_personnalises||"",frais_annuel_defaut:etab.frais_annuel_defaut||"",
    mode_maternelle:etab.mode_maternelle||"note",
    entete_lignes:Array.isArray(etab.entete_lignes)?etab.entete_lignes:[],
    moyens_paiement:Array.isArray(etab.moyens_paiement)&&etab.moyens_paiement.length?etab.moyens_paiement:["Espèces","Orange Money","MoMo","Carte Visa","Chèque"],
    logo:etab.logo||"",logo2:etab.logo2||"",logo_app:etab.logo_app||"",logo_disposition:(etab.logo_disposition==="centre_haut"?"centre":etab.logo_disposition)||"centre",logo_position:etab.logo_position||"milieu"
  });
  const [loading,setLoading]=useState(false);
  const [saved,setSaved]=useState(false);
  // Admin : toutes les sections. Sinon : uniquement ce qui concerne les documents.
  const isAdminP = currentUser?.role==="Administrateur";
  const sectionsDispo = isAdminP ? ["ecole","apparence","documents","paiement"] : ["apparence","documents"];
  const [section,setSection]=useState(isAdminP?"ecole":"documents");
  // Frais par classe (édition groupée)
  const [fraisClasses,setFraisClasses]=useState(()=>{
    const o={};(data?.classes||[]).forEach(c=>{o[c.id]={mensuel:c.mensualite_classe??"",annuel:c.frais_annuel_classe??"",insc:c.frais_inscription_classe??""};});return o;
  });
  const [savingFrais,setSavingFrais]=useState(false);
  const [fraisSaved,setFraisSaved]=useState(false);
  const save=async()=>{
    if(!form.nom)return;setLoading(true);
    const updated=await ops.updateEtab(etab.id,form);
    setLoading(false);
    if(updated){onEtabUpdate(updated);setSaved(true);setTimeout(()=>setSaved(false),2500);}
  };
  const saveFrais=async()=>{
    setSavingFrais(true);
    for(const c of (data?.classes||[])){
      const f=fraisClasses[c.id]||{};
      await ops.updateClass(c.id,{nom:c.nom,niveau:c.niveau,niveau_detail:c.niveau_detail,serie:c.serie,effectif:c.effectif,mensualite_classe:f.mensuel,frais_annuel_classe:f.annuel,frais_inscription_classe:f.insc});
    }
    setSavingFrais(false);setFraisSaved(true);setTimeout(()=>setFraisSaved(false),2500);
  };
  const setFrais=(cid,k,v)=>setFraisClasses(o=>({...o,[cid]:{...o[cid],[k]:v}}));
  // Lignes d'en-tête personnalisées
  const addLigne=()=>setForm(f=>({...f,entete_lignes:[...(f.entete_lignes||[]),{texte:"",gras:false,pos:"center"}]}));
  const setLigne=(i,k,v)=>setForm(f=>{const l=[...(f.entete_lignes||[])];l[i]={...l[i],[k]:v};return{...f,entete_lignes:l};});
  const delLigne=i=>setForm(f=>({...f,entete_lignes:(f.entete_lignes||[]).filter((_,j)=>j!==i)}));
  const addMoyen=()=>setForm(f=>({...f,moyens_paiement:[...(f.moyens_paiement||[]),"Nouveau"]}));
  const setMoyen=(i,v)=>setForm(f=>{const m=[...(f.moyens_paiement||[])];m[i]=v;return{...f,moyens_paiement:m};});
  const delMoyen=i=>setForm(f=>({...f,moyens_paiement:(f.moyens_paiement||[]).filter((_,j)=>j!==i)}));
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  // Aperçu live de la devise colorée (miroir de officialHeader)
  const FLAG_GN=["#ce1126","#fcd116","#009460"]; // drapeau guinéen : rouge · jaune · vert
  const dvMode = form.devise_mots?.mode || ((form.devise_mots?.m1||form.devise_mots?.m2||form.devise_mots?.m3)?"manuel":"");
  const setDv=(k,v)=>setForm(f=>({...f,devise_mots:{...f.devise_mots,[k]:v}}));
  const splitDv=t=>(t||"").split(/\s*[·\-–—|/]\s*/).map(s=>s.trim()).filter(Boolean);
  const devisePreview=()=>{
    const dm=form.devise_mots||{}, nat=form.devise_nationale||"";
    const sep=<span style={{color:"var(--me-text-3)",fontWeight:400,fontStyle:"normal"}}> · </span>;
    const vide=<span style={{color:"var(--me-text-3)",fontWeight:400,fontStyle:"normal"}}>Renseignez la devise nationale ci-dessus.</span>;
    if(dvMode==="drapeau"){const mots=splitDv(nat);return mots.length?mots.map((w,i,a)=><span key={i}><span style={{color:FLAG_GN[i%3]}}>{w}</span>{i<a.length-1?sep:null}</span>):vide;}
    if(dvMode==="uni"){return nat?<span style={{color:dm.couleur||form.theme_couleur||"#1a56db"}}>{nat}</span>:vide;}
    if(dvMode==="manuel"){const ws=[["m1","c1"],["m2","c2"],["m3","c3"]].filter(p=>dm[p[0]]);return ws.length?ws.map((p,i,a)=><span key={p[0]}><span style={{color:dm[p[1]]||"var(--me-text)"}}>{dm[p[0]]}</span>{i<a.length-1?sep:null}</span>):<span style={{color:"var(--me-text-3)",fontWeight:400,fontStyle:"normal"}}>Saisissez les mots ci-dessous.</span>;}
    return <span style={{color:"var(--me-text-2)"}}>{nat||"—"}</span>;
  };
  // ── Périodes / compositions personnalisables ──
  const effPeriodes = periodeItems({periodes:form.periodes, systeme:form.systeme}); // [{n, ar}]
  const periodesCustom = Array.isArray(form.periodes)&&form.periodes.length>0;

// Le rôle Professeur a un menu limité (entrées avec prof:true) + Tableau de bord
const navForRole=(role)=> role==="Professeur" ? NAV.filter(n=>n.prof||n.id==="dashboard") : NAV;
// Pages réellement accessibles : Admin = tout ; sinon permissions personnalisées si définies, sinon défaut du rôle
const pagesForUser=(u)=>{
  if(!u||u.role==="Administrateur") return NAV.map(n=>n.id);
  if(Array.isArray(u.pages_autorisees)&&u.pages_autorisees.length) return [...new Set(["dashboard",...u.pages_autorisees])];
  return navForRole(u.role).map(n=>n.id);
};
// Sections de l'onglet Établissement (Paramètres)
const PARAM_SECTIONS=["ecole","apparence","documents","paiement"];
const paramSectionsForUser=(u)=>{
  if(!u||u.role==="Administrateur") return PARAM_SECTIONS;
  if(Array.isArray(u.param_sections)&&u.param_sections.length) return PARAM_SECTIONS.filter(s=>u.param_sections.includes(s));
  return PARAM_SECTIONS;
};

function CheckScreen({codeActivation,onResult}) {
  useEffect(()=>{
    let actif=true;
    sb.from("etablissements").select("*").eq("code_activation",codeActivation).maybeSingle()
      .then(({data:e})=>{if(actif)onResult(e||null);})
      .catch(()=>{if(actif)onResult(null);});
    return ()=>{actif=false;};
  },[]);
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#fff",fontSize:18,fontWeight:700}}>⏳ Chargement...</div></div>;
}

function MasterGate({onOk}) {
  const [pw,setPw]=useState("");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(!pw||busy) return;
    setBusy(true); setErr("");
    try{
      const h=await hashPw(pw,MASTER_PASSWORD_SALT);
      if(h && h===MASTER_PASSWORD_HASH){ onOk(pw); }
      else setErr("Mot de passe maître incorrect.");
    }catch(_){ setErr("Vérification impossible (HTTPS requis)."); }
    setBusy(false);
  };
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Plus Jakarta Sans',sans-serif",padding:16}}>

        {err&&<div style={{background:"rgba(220,38,38,0.10)",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginBottom:12}}>{err}</div>}

  );

// Espace éditeur : configuration de la base + création d'école
function EditorHub({onCreate,masterPw}) {
  const [cfgUrl,setCfgUrl]=useState("");const [cfgKey,setCfgKey]=useState("");
  const [genFormule,setGenFormule]=useState("standard");
  const [genLoading,setGenLoading]=useState(false);
  const [genErr,setGenErr]=useState("");
  const [codes,setCodes]=useState([]);
  const [lastCode,setLastCode]=useState("");
  const [copied,setCopied]=useState("");
  const loadCodes=async()=>{try{const{data}=await sb.from("codes_activation").select("*").order("created_at",{ascending:false}).limit(50);setCodes(data||[]);}catch(_){}}
  useEffect(()=>{loadCodes();},[]);
  const genererCode=async()=>{
    if(genLoading)return;setGenLoading(true);setGenErr("");setLastCode("");
    try{
      const{data,error}=await sb.functions.invoke("generer-code",{body:{motDePasse:masterPw||"",formule:genFormule}});
      if(error){let m="Génération impossible.";try{const j=await error.context.json();if(j&&j.error)m=j.error;}catch(_){}setGenErr(m);}
      else if(data&&data.code){setLastCode(data.code);loadCodes();}

    }catch(e){setGenErr("Erreur : "+(e.message||e));}
    setGenLoading(false);
  };

    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Plus Jakarta Sans',sans-serif",padding:16}}>

        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:54,height:54,borderRadius:15,background:"rgba(26,86,219,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 12px"}}>🛠️</div>
          <h2 style={{margin:"0 0 3px",fontSize:19,fontWeight:900,color:"var(--me-text)"}}>Espace éditeur</h2>
          <p style={{margin:0,color:"var(--me-text-3)",fontSize:12}}>Configurer une base et créer une nouvelle école</p>
        </div>

        <div style={{background:"var(--me-surface-2,#f8fafc)",borderRadius:13,padding:16,marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:13,color:"var(--me-text)",marginBottom:4}}>1️⃣ Base de données de l'école</div>
          <div style={{fontSize:11,color:"var(--me-text-2)",marginBottom:12,lineHeight:1.5}}>Collez l'<b>URL</b> et la <b>clé anon</b> du projet Supabase de cette école. {SB_CONFIG.custom?<span style={{color:"#059669",fontWeight:700}}>✓ Base personnalisée active.</span>:<span style={{color:"#c2410c",fontWeight:700}}>Base de démonstration active.</span>}</div>
          <Inp label="URL du projet Supabase" value={cfgUrl} onChange={e=>setCfgUrl(e.target.value)} placeholder="https://xxxx.supabase.co"/>
          <Lbl t="Clé anon (public)"><textarea value={cfgKey} onChange={e=>setCfgKey(e.target.value)} style={{...iSt(),minHeight:54,resize:"vertical",fontFamily:"monospace",fontSize:10}} placeholder="eyJhbGc..."/></Lbl>
          <div style={{display:"flex",gap:8}}>
            <Btn ch="Enregistrer & recharger" v="success" s={{flex:1}} onClick={()=>{if(cfgUrl.trim()&&cfgKey.trim())saveSupabaseConfig(cfgUrl,cfgKey);}} disabled={!cfgUrl.trim()||!cfgKey.trim()}/>
            {SB_CONFIG.custom&&<Btn ch="Réinitialiser" v="ghost" onClick={resetSupabaseConfig}/>}
          </div>
        </div>

        <div style={{background:"var(--me-surface-2,#f8fafc)",borderRadius:13,padding:16,marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:13,color:"var(--me-text)",marginBottom:4}}>2️⃣ Créer l'école</div>
          <div style={{fontSize:11,color:"var(--me-text-2)",marginBottom:12,lineHeight:1.5}}>Une fois la bonne base active ci-dessus, créez l'établissement et son compte administrateur.</div>
          <Btn ch="Créer une nouvelle école →" v="primary" onClick={onCreate} full/>
        </div>

        <div style={{background:"var(--me-surface-2,#f8fafc)",borderRadius:13,padding:16,marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:13,color:"var(--me-text)",marginBottom:4}}>3️⃣ Générer un code d'activation</div>
          <div style={{fontSize:11,color:"var(--me-text-2)",marginBottom:12,lineHeight:1.5}}>Choisissez la formule, générez un code, puis transmettez-le à l'école. Un code = une école.</div>
          <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:170}}><Slt label="Formule" value={genFormule} onChange={e=>setGenFormule(e.target.value)} opts={[{v:"basique",l:"Basique — 1 administrateur"},{v:"standard",l:"Standard — 3 administrateurs"},{v:"premium",l:"Premium — illimité"}]}/></div>
            <Btn ch={genLoading?"Génération…":"Générer un code"} v="success" onClick={genererCode} disabled={genLoading}/>
          </div>
          {genErr&&<div style={{background:"rgba(220,38,38,0.10)",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginTop:10}}>{genErr}</div>}
          {lastCode&&<div style={{background:"rgba(5,150,105,0.12)",border:"1px solid #a7f3d0",borderRadius:10,padding:"12px 14px",marginTop:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <div><div style={{fontSize:10,color:"#059669",fontWeight:700,letterSpacing:1}}>NOUVEAU CODE</div><div style={{fontSize:20,fontWeight:900,color:"#065f46",letterSpacing:2}}>{lastCode}</div></div>
            <Btn ch={copied===lastCode?"✓ Copié":"Copier"} v="ghost" onClick={()=>copier(lastCode)}/>
          </div>}
          {codes.length>0&&<div style={{marginTop:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--me-text-2)",marginBottom:6}}>Codes existants ({codes.length})</div>
            <div style={{maxHeight:170,overflowY:"auto",border:"1px solid #eef2f7",borderRadius:9}}>
              {codes.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"8px 11px",borderBottom:"1px solid #f1f5f9",fontSize:12}}>
                <span style={{fontWeight:800,color:"var(--me-text)",letterSpacing:1}}>{c.code}</span>
                <span style={{fontSize:10,fontWeight:700,color:"var(--me-text-2)",textTransform:"capitalize"}}>{FORMULES[c.formule]?.l||c.formule}</span>
                <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:c.statut==="libre"?"#dcfce7":"#fee2e2",color:c.statut==="libre"?"#166534":"#991b1b"}}>{c.statut==="libre"?"Libre":"Utilisé"}</span>
                <a href="#" onClick={e=>{e.preventDefault();copier(c.code);}} style={{fontSize:11,color:"#1a56db",textDecoration:"none",fontWeight:700}}>{copied===c.code?"✓":"Copier"}</a>
              </div>))}
            </div>
          </div>}
        </div>

        <div style={{textAlign:"center"}}><a href="#" onClick={e=>{e.preventDefault();try{location.hash="";}catch(_){};location.reload();}} style={{color:"var(--me-text-3)",fontSize:11,textDecoration:"none"}}>← Retour à la connexion</a></div>
      </div>
    </div>
  );
}

  corail:{l:"Corail",sw:"#fbe1d9",dark:false,v:{bg:"linear-gradient(135deg,#fdeee9,#fbe1d9)",surface:"#fffaf8",s2:"#fbeee8",border:"#f6ddd2",border2:"#f0c8b8",text:"#3d241c",text2:"#8a5f52",text3:"#c0998a"}},
  ciel:{l:"Ciel",sw:"#d8ecf8",dark:false,v:{bg:"linear-gradient(135deg,#e8f4fb,#d8ecf8)",surface:"#ffffff",s2:"#eef6fc",border:"#d9eaf6",border2:"#c2dcef",text:"#10293b",text2:"#4f6b80",text3:"#8aa3b5"}},
  foret:{l:"Forêt",sw:"#d8ebe0",dark:false,v:{bg:"linear-gradient(135deg,#e7f2ec,#d8ebe0)",surface:"#ffffff",s2:"#eef6f1",border:"#d8ebe0",border2:"#bfddcb",text:"#14302a",text2:"#4a6b5e",text3:"#88a89a"}},
  lavande:{l:"Lavande",sw:"#e7e3f7",dark:false,v:{bg:"linear-gradient(135deg,#efecfa,#e7e3f7)",surface:"#ffffff",s2:"#f3f1fb",border:"#e6e1f4",border2:"#d6cfeb",text:"#241f3a",text2:"#655d80",text3:"#9389b0"}},

function App() {
  // Mode création (éditeur) seulement si l'URL contient #admin-create
  const adminMode = isAdminCreateMode();
  const hasSession = (()=>{ try{ return !adminMode && !!localStorage.getItem("monecole_uid"); }catch(_){ return false; } })();
  const [screen,setScreen]=useState(adminMode?"master":"login");
  const [booting,setBooting]=useState(hasSession); // restauration de session en cours
  const [codeActivation,setCodeActivation]=useState("");
  const [masterPw,setMasterPw]=useState("");
  const [currentUser,setCurrentUser]=useState(null);
  const [etab,setEtab]=useState(null);
  const [page,setPage]=useState(()=>{try{return localStorage.getItem("monecole_page")||"dashboard";}catch(_){return "dashboard";}});
  const [lang,setLang]=useState(CURRENT_LANG);
  CURRENT_LANG=lang; // synchronise la langue lue par t()/txt() dès ce rendu (changement immédiat en 1 clic)
  const [uiZoom,setUiZoom]=useState(()=>{try{const v=parseFloat(localStorage.getItem("monecole_zoom"));return v&&v>=0.85&&v<=1.6?v:1.1;}catch(_){return 1.1;}});
  const [isMobile,setIsMobile]=useState(()=>{try{return window.innerWidth<860;}catch(_){return false;}});
  const [navOpen,setNavOpen]=useState(false);
  const [quickOpen,setQuickOpen]=useState(false);
  const [themeOpen,setThemeOpen]=useState(false);
  const [theme,setTheme]=useState(()=>{try{const v=localStorage.getItem("monecole_theme");if(v==="dark")return "sombre";if(!v||v==="light")return "clair";return THEMES[v]?v:"clair";}catch(_){return "clair";}});
  useEffect(()=>{try{localStorage.setItem("monecole_theme",theme);}catch(_){}},[theme]);
  const TH=THEMES[theme]||THEMES.clair;
  useEffect(()=>{const onR=()=>{try{setIsMobile(window.innerWidth<860);}catch(_){}};window.addEventListener("resize",onR);return ()=>window.removeEventListener("resize",onR);},[]);
  useEffect(()=>{try{let m=document.querySelector('meta[name=viewport]');if(!m){m=document.createElement("meta");m.name="viewport";document.head.appendChild(m);}m.setAttribute("content","width=device-width, initial-scale=1, viewport-fit=cover");}catch(_){}},[]);
  useEffect(()=>{try{localStorage.setItem("monecole_page",page);}catch(_){}},[page]);
  useEffect(()=>{try{localStorage.setItem("monecole_zoom",String(uiZoom));}catch(_){}},[uiZoom]);
  const [msgSeen,setMsgSeen]=useState(0);
  useEffect(()=>{if(!currentUser)return;try{setMsgSeen(parseInt(localStorage.getItem("monecole_msg_seen_"+currentUser.id)||"0")||0);}catch(_){}},[currentUser]);
  useEffect(()=>{if(page==="messagerie"&&currentUser){const now=Date.now();try{localStorage.setItem("monecole_msg_seen_"+currentUser.id,String(now));}catch(_){}setMsgSeen(now);}},[page,currentUser]);

  const {data,syncStatus,toast,ops}=useSupabaseData(etab?.id);

  // ── Notifications : nouveaux messages ──
  const [notifEnabled,setNotifEnabled]=useState(()=>{try{return localStorage.getItem("monecole_notifs")==="1"&&NOTIF_OK&&Notification.permission==="granted";}catch(_){return false;}});
  const lastMsgRef=useRef(null);
  useEffect(()=>{
    if(!currentUser){lastMsgRef.current=null;return;}
    const msgs=data.messages||[];
    const maxTs=msgs.reduce((mx,m)=>Math.max(mx,new Date(m.created_at).getTime()||0),0);
    if(lastMsgRef.current===null){lastMsgRef.current=maxTs;return;}
    const fresh=msgs.filter(m=>m.auteur_id!==currentUser.id&&(new Date(m.created_at).getTime()||0)>lastMsgRef.current);
    lastMsgRef.current=Math.max(lastMsgRef.current,maxTs);
    if(fresh.length&&(page!=="messagerie"||(typeof document!=="undefined"&&document.hidden))){
      const last=fresh[fresh.length-1];
      const apercu=last.texte?last.texte.slice(0,90):(Array.isArray(last.fichiers)&&last.fichiers.some(f=>(f.type||"").startsWith("audio/"))?"🎤 "+t("msg_voc"):"📎 "+t("msg_joindre"));
      notify(t("notif_msg_titre"),fresh.length>1?`${fresh.length} ${t("notif_msg_plus")}`:`${last.auteur} : ${apercu}`,"monecole-msg");
    }
  },[data.messages,currentUser,page]);

  // ── Notifications : rappels de cours du professeur ──
  useEffect(()=>{
    if(!currentUser||currentUser.role!=="Professeur")return;
    const JOURS=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
    const mAut=Array.isArray(currentUser.matieres_autorisees)?currentUser.matieres_autorisees:[];
    const cAut=Array.isArray(currentUser.classes_autorisees)?currentUser.classes_autorisees:[];
    const matNom=id=>{const m=(data.matieres||[]).find(x=>x.id===id);return m?txt(m.nom,m.nom_ar):"";};
    const classeNom=id=>(data.classes||[]).find(c=>c.id===id)?.nom||"";
    const check=()=>{
      if(!notifsActives())return;
      const now=new Date();const jour=JOURS[now.getDay()];const jj=now.toISOString().slice(0,10);
      const cours=(data.emploi_temps||[]).filter(c=>c.jour===jour)
        .filter(c=>mAut.length===0||mAut.includes(c.matiere_id))
        .filter(c=>cAut.length===0||cAut.includes(c.classe_id))
        .sort((a,b)=>(a.debut||"").localeCompare(b.debut||""));
      const dayKey="monecole_daily_"+currentUser.id+"_"+jj;
      if(cours.length){try{if(localStorage.getItem(dayKey)!=="1"){localStorage.setItem(dayKey,"1");notify(t("notif_jour_titre"),`${cours.length} ${cours.length>1?t("notif_jour_cours_p"):t("notif_jour_cours")} — ${cours.map(c=>c.debut).filter(Boolean).join(", ")}`,"monecole-daily");}}catch(_){}}
      cours.forEach(c=>{
        if(!c.debut)return;const parts=c.debut.split(":");const h=parseInt(parts[0]);const mn=parseInt(parts[1]||"0");if(isNaN(h))return;
        const start=new Date(now);start.setHours(h,mn,0,0);
        const diff=(start-now)/60000;
        const remKey="monecole_rem_"+currentUser.id+"_"+jj+"_"+c.id;
        if(diff>0&&diff<=15){try{if(localStorage.getItem(remKey)!=="1"){localStorage.setItem(remKey,"1");notify(t("notif_cours_titre"),`${matNom(c.matiere_id)} · ${classeNom(c.classe_id)} — ${c.debut}${c.salle?" · 📍 "+c.salle:""}`,"monecole-cours-"+c.id);}}catch(_){}}
      });
    };
    check();const iv=setInterval(check,60000);return ()=>clearInterval(iv);
  },[currentUser,data.emploi_temps,data.matieres,data.classes]);

  // Applique la langue : met à jour la variable globale, le stockage et le sens d'écriture (RTL pour l'arabe)
  useEffect(()=>{ CURRENT_LANG=lang; try{localStorage.setItem("monecole_lang",lang);}catch(_){} try{document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";}catch(_){} },[lang]);

  useEffect(()=>{const l=document.createElement("link");l.href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap";l.rel="stylesheet";document.head.appendChild(l);},[]);

  // Ajustements responsives cosmétiques (le layout principal est piloté par isMobile)
  useEffect(()=>{
    try{const mv=document.querySelector('meta[name="viewport"]');if(mv)mv.setAttribute("content","width=device-width, initial-scale=1, viewport-fit=cover");}catch(_){}
    if(document.getElementById("me-responsive")) return;
    const st=document.createElement("style"); st.id="me-responsive";
    st.textContent=`
      html,body{max-width:100%;overflow-x:hidden;}
      *{-webkit-tap-highlight-color:rgba(0,0,0,0);}
      button,a,select,label,[role=button]{touch-action:manipulation;}
      .me-main{min-width:0;-webkit-overflow-scrolling:touch;}
      .me-page{max-width:100%;}
      .me-page img{max-width:100%;height:auto;}
      .me-tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
      body{zoom:1.12;}
      @media (max-width:1100px){ body{zoom:1.08;} }
      @media (max-width:860px){
        body{zoom:1.0;}
        input,select,textarea{font-size:16px !important;}
        .me-shdr{flex-wrap:wrap}
        .me-shdr h2{font-size:19px !important}
        .me-page table{font-size:11.5px}
        .me-page td,.me-page th{padding:7px 8px !important}
        .me-msg-grid{grid-template-columns:1fr !important;height:auto !important;}
        .me-msg-grid > .me-card:first-child{max-height:38vh;}
        .me-msg-grid > .me-card:last-child{min-height:60vh;}
      }
      @media (max-width:420px){ .me-card{padding:14px !important} .me-page td,.me-page th{padding:6px 6px !important} }
    `;
    document.head.appendChild(st);
  },[]);

  // Restaure l'utilisateur connecté après un rafraîchissement (session stockée par identifiant)
  useEffect(()=>{
    if(!booting) return;
    let uid=null; try{ uid=localStorage.getItem("monecole_uid"); }catch(_){}
    if(!uid){ setBooting(false); return; }
    (async()=>{
      try{
        const {data:u,error}=await sb.from("utilisateurs").select("*,etablissements(*)").eq("id",uid).single();
        if(error||!u) throw error||new Error("session invalide");
        setCurrentUser(u); setEtab(u.etablissements||null); setScreen("app");
      }catch(_){ try{localStorage.removeItem("monecole_uid");}catch(__){} setScreen("login"); }
      setBooting(false);
    })();
  },[booting]);

  if(booting) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:"'Plus Jakarta Sans',sans-serif",color:"#fff"}}>
      <div style={{width:54,height:54,borderRadius:15,background:"rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🎓</div>
      <div style={{fontSize:13,fontWeight:700,opacity:.85}}>{t("reconnect")}</div>
    </div>
  );

  // Espace éditeur (création d'école) — protégé par mot de passe maître
  if(screen==="master") return <MasterGate onOk={(pw)=>{setMasterPw(pw||"");setScreen("editor");}}/>;
  if(screen==="editor") return <EditorHub onCreate={()=>setScreen("activation")} masterPw={masterPw}/>;
  if(screen==="activation") return <ActivationScreen onDone={c=>{setCodeActivation(c);setScreen("check");}}/>;
  if(screen==="check") return <CheckScreen codeActivation={codeActivation} onResult={(e)=>{if(e){setEtab(e);setScreen("login");}else setScreen("onboarding");}}/>;
  if(screen==="onboarding") return <Onboarding codeActivation={codeActivation} onDone={(e,a)=>{try{if(a&&a.id!=null)localStorage.setItem("monecole_uid",String(a.id));}catch(_){}setEtab(e);setCurrentUser(a);setScreen("app");}}/>;

  // Écran normal pour les écoles : connexion directe
  if(screen==="login") return <Login lang={lang} setLang={setLang} onLogin={(u,e)=>{try{if(u&&u.id!=null)localStorage.setItem("monecole_uid",String(u.id));}catch(_){}setCurrentUser(u);setEtab(e||etab);setScreen("app");}}/>;

  // Sécurité : un professeur ne peut afficher que les pages autorisées
  const allowed=pagesForUser(currentUser);
  const safePage=allowed.includes(page)?page:"dashboard";

  // Restriction enseignant : ne voir que ses classes / ses matières (le reste des écrans s'y adapte automatiquement)
  const restrClasses = Array.isArray(currentUser?.classes_autorisees) && currentUser.classes_autorisees.length;
