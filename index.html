            <ResponsiveContainer width="100%" height={130}><PieChart><Pie data={repartition.map(r=>({name:r.name,value:r.v}))} cx="50%" cy="50%" outerRadius={60} dataKey="value">{repartition.map((r,i)=><Cell key={i} fill={r.c}/>)}</Pie><Tooltip/></PieChart></ResponsiveContainer>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>{repartition.map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"var(--me-text-2)"}}><div style={{width:7,height:7,borderRadius:2,background:r.c}}/>{r.name} ({r.v})</div>)}</div>
          </Card>
        </div>
      )}
      {moyennes.length>0&&(
        <Card><div style={{fontWeight:700,fontSize:13,color:"var(--me-text)",marginBottom:12}}>🥇 {t("db_meilleurs")} — {periodeLabel(etab,lastP)}</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {data.eleves.map(e=>({...e,moy:parseFloat(calcMoy(e.notes||{},data.matieres,lastP))||0})).sort((a,b)=>b.moy-a.moy).slice(0,5).map((e,i)=>{
              const cl=data.classes.find(c=>c.id===e.classe_id);const m=MENTION(e.moy,baremeOf(cl?.niveau));
              return(<div key={e.id} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 13px",borderRadius:10,background:i===0?"#fef9c3":"#f8fafc",border:i===0?"1px solid #fde047":"1px solid #f1f5f9"}}>
                <span style={{fontSize:16}}>{["🥇","🥈","🥉"][i]||`${i+1}.`}</span>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{e.prenom} {e.nom}</div><div style={{fontSize:11,color:"var(--me-text-3)"}}>{cl?.nom} · {e.matricule}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:16,color:m.c}}>{e.moy.toFixed(2)}</div><span style={{background:m.bg,color:m.c,borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:700}}>{m.t}</span></div>
              </div>);
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

// ── CLASSES ───────────────────────────────────────────────────────────────────
function Classes({data,ops,etab}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nom:"",nom_ar:"",niveau:"",niveau_detail:"",serie:"",effectif:"",frais_annuel_classe:"",frais_inscription_classe:"",classe_suivante_id:""});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [promo,setPromo]=useState(false);
  const [promoLoading,setPromoLoading]=useState(false);
  const devise=etab?.devise||"GNF";
  // Moyenne annuelle d'un élève (moyenne des moyennes de période) + seuil d'admission
  const periodes=periodesList(etab);
  const moyAnn=(el)=>{const mp=periodes.map(p=>parseFloat(calcMoy(el.notes||{},data.matieres,p))).filter(v=>!isNaN(v));return mp.length?mp.reduce((a,b)=>a+b,0)/mp.length:null;};
  const seuilOf=(cl)=>baremeOf(cl?.niveau)/2;
  const save=async()=>{
    if(!form.nom){setErr(t("cl_nom_oblig"));return;}
    // Anti-doublon : même nom (insensible casse/espaces) dans le même cycle
    const norm=s=>(s||"").trim().toLowerCase();
    const doublon=data.classes.find(c=>c.id!==modal&&norm(c.nom)===norm(form.nom)&&(c.niveau||"")===(form.niveau||""));
    if(doublon){setErr(`${t("cl_doublon_a")} "${form.nom}" ${t("cl_doublon_b")} ${form.niveau||t("cl_ce_niveau")}.`);return;}
    setErr("");setLoading(true);
    const payload={...form,classe_suivante_id:form.classe_suivante_id?parseInt(form.classe_suivante_id):null};
    if(modal==="add")await ops.addClass(payload);else await ops.updateClass(modal,payload);
    setLoading(false);setModal(null);
  };
  // Suggère un nom à partir du niveau + série
  const suggereNom=(niveau_detail,serie)=>!niveau_detail?"":serie?`${niveau_detail} ${serie==="Scientifique"?"S":"L"}`:niveau_detail;
  const openNew=()=>{setErr("");setForm({nom:"",nom_ar:"",niveau:"",niveau_detail:"",serie:"",effectif:"",frais_annuel_classe:"",frais_inscription_classe:"",classe_suivante_id:""});setModal("add");};
  // Calcul du passage : par classe ayant une classe suivante, qui est admis / redoublant
  const promoInfos=data.classes.filter(c=>c.classe_suivante_id).map(c=>{
    const els=data.eleves.filter(e=>e.classe_id===c.id);
    let admis=0,redouble=0,sansNote=0;
    els.forEach(e=>{const m=moyAnn(e);if(m==null)sansNote++;else if(m>=seuilOf(c))admis++;else redouble++;});
    const suiv=data.classes.find(x=>x.id===c.classe_suivante_id);
    return {cl:c,suiv,admis,redouble,sansNote};
  });
  const totalAdmis=promoInfos.reduce((s,p)=>s+p.admis,0);
  const promouvoir=async()=>{
    setPromoLoading(true);
    const moves=[];
    data.classes.filter(c=>c.classe_suivante_id).forEach(c=>{
      data.eleves.filter(e=>e.classe_id===c.id).forEach(e=>{const m=moyAnn(e);if(m!=null&&m>=seuilOf(c))moves.push({id:e.id,classe_id:c.classe_suivante_id});});
    });
    if(moves.length)await ops.promouvoirEleves(moves);
    setPromoLoading(false);setPromo(false);
  };
  return(
    <div>
      <SHdr title={t("nav_classes")+" 🏫"} sub={`${data.classes.length} ${t("cl_count")}`} action={<div style={{display:"flex",gap:8,flexWrap:"wrap"}}><ExportBar name="classes" title={t("nav_classes")} getRows={()=>data.classes.map(c=>({Classe:c.nom,Cycle:c.niveau||"",Niveau:c.niveau_detail||"","Série":c.serie||"",Effectif:data.eleves.filter(e=>e.classe_id===c.id).length,"Frais annuel":c.frais_annuel_classe||"","Frais inscription":c.frais_inscription_classe||""}))}/>{data.classes.length>0&&<Btn ch={t("cl_passage")} v="ghost" onClick={()=>setPromo(true)}/>}<Btn ch={t("btn_new_classe")} v="primary" onClick={openNew}/></div>}/>
      {data.classes.length===0?<Card><Empty icon="🏫" text={t("cl_empty")}/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {CYCLES.map(cyc=>{
            const classesCyc=data.classes.filter(c=>(c.niveau||"Primaire")===cyc);
            if(classesCyc.length===0)return null;
            return(<div key={cyc}>
              <div style={{fontSize:13,fontWeight:800,color:"var(--me-text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>{cyc==="Primaire"?"🟦":cyc==="Collège"?"🟪":"🟩"} {(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[cyc]||cyc)}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:13}}>
                {classesCyc.map(c=>(
                  <Card key={c.id}>
                    <div style={{fontSize:26,marginBottom:8}}>📓</div>
                    <div style={{fontWeight:800,fontSize:15,color:"var(--me-text)",marginBottom:3}}>{txt(c.nom,c.nom_ar)}</div>
                    <div style={{fontSize:12,color:"var(--me-text-2)",marginBottom:6}}>{c.niveau_detail||c.niveau}{c.serie?` · ${c.serie}`:""}</div>
                    {(c.frais_annuel_classe||c.frais_inscription_classe)&&<div style={{fontSize:11,color:"#059669",fontWeight:600,marginBottom:10}}>💰 {c.frais_annuel_classe?fmtMoney(c.frais_annuel_classe,devise):"—"}{t("cl_an")}</div>}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                      <span style={{background:"rgba(26,86,219,0.12)",color:"#1a56db",borderRadius:7,padding:"3px 9px",fontSize:11,fontWeight:700}}>👤 {data.eleves.filter(e=>e.classe_id===c.id).length}</span>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>{setErr("");setForm({nom:c.nom,nom_ar:c.nom_ar||"",niveau:c.niveau||"",niveau_detail:c.niveau_detail||"",serie:c.serie||"",effectif:c.effectif||"",frais_annuel_classe:c.frais_annuel_classe??"",frais_inscription_classe:c.frais_inscription_classe??"",classe_suivante_id:c.classe_suivante_id??""});setModal(c.id);}} style={{background:"var(--me-surface-2,#f1f5f9)",color:"var(--me-text-2)",border:"none",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_modifier")}</button>
                        <button onClick={()=>ops.deleteClass(c.id)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_supprimer")}</button>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            </div>);
          })}
        </div>
      )}
      {modal&&<Modal title={modal==="add"?t("cl_new_titre"):t("cl_edit_titre")} onClose={()=>setModal(null)} w={540}>
        <Slt label={t("cl_cycle")} value={form.niveau} onChange={e=>{const niveau=e.target.value;setForm(f=>({...f,niveau,niveau_detail:"",serie:niveau==="Lycée"?f.serie:""}));}} opts={[{v:"",l:t("cl_choisir_cycle")},...CYCLES.map(c=>({v:c,l:`${(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[c]||c)} (${t("cl_note_sur")} ${baremeOf(c)})`}))]}/>
        {form.niveau&&<Slt label={t("cl_niveau")} value={form.niveau_detail} onChange={e=>{const nd=e.target.value;setForm(f=>({...f,niveau_detail:nd,nom:suggereNom(nd,f.serie)}));}} opts={[{v:"",l:t("cl_choisir_niveau")},...(NIVEAUX_CYCLE[form.niveau]||[]).map(n=>({v:n,l:n}))]}/>}
        {form.niveau==="Lycée"&&<Slt label={t("cl_serie")} value={form.serie} onChange={e=>{const s=e.target.value;setForm(f=>({...f,serie:s,nom:suggereNom(f.niveau_detail,s)}));}} opts={[{v:"",l:t("cl_choisir_serie")},...SERIES.map(s=>({v:s,l:s}))]}/>}
        <Inp label={t("cl_nom")} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder={t("cl_nom_ph")}/>
        <Lbl t="الاسم بالعربية · Nom en arabe (facultatif)"><input dir="rtl" value={form.nom_ar||""} onChange={e=>setForm(f=>({...f,nom_ar:e.target.value}))} style={{...iSt(),fontFamily:"'Traditional Arabic','Amiri',serif",fontSize:15}} placeholder="القسم"/></Lbl>
        {err&&<div style={{background:"rgba(220,38,38,0.10)",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,margin:"4px 0"}}>{err}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={`${t("cl_frais_an")} (${devise})`} type="number" value={form.frais_annuel_classe} onChange={e=>setForm(f=>({...f,frais_annuel_classe:e.target.value}))} placeholder={etab?.frais_annuel_defaut?`Défaut: ${etab.frais_annuel_defaut}`:t("cl_defaut")}/>
          <Inp label={`${t("cl_frais_insc")} (${devise})`} type="number" value={form.frais_inscription_classe} onChange={e=>setForm(f=>({...f,frais_inscription_classe:e.target.value}))} placeholder={etab?.fraisInscription?`Défaut: ${etab.fraisInscription}`:t("cl_defaut")}/>
        </div>
        <Inp label={t("cl_effectif")} type="number" value={form.effectif} onChange={e=>setForm(f=>({...f,effectif:e.target.value}))}/>
        <Slt label={t("cl_suivante")} value={form.classe_suivante_id} onChange={e=>setForm(f=>({...f,classe_suivante_id:e.target.value}))} opts={[{v:"",l:t("cl_aucune_suivante")},...data.classes.filter(c=>c.id!==modal).map(c=>({v:String(c.id),l:txt(c.nom,c.nom_ar)}))]}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":t("btn_save")} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
      {promo&&<Modal title={t("cl_passage_titre")} onClose={()=>setPromo(false)} w={560}>
        <div style={{fontSize:12,color:"var(--me-text-2)",marginBottom:14}}>{t("cl_passage_intro")}</div>
        {promoInfos.length===0?<div style={{fontSize:12,color:"var(--me-text-3)",background:"rgba(217,119,6,0.12)",border:"1px solid #fde68a",borderRadius:9,padding:"11px 13px"}}>{t("cl_passage_aucune_def")}</div>:(<>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {promoInfos.map(p=>(
              <div key={p.cl.id} style={{background:"var(--me-surface-2,#f8fafc)",borderRadius:10,padding:"10px 13px"}}>
                <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{txt(p.cl.nom,p.cl.nom_ar)} <span style={{color:"var(--me-text-3)",fontWeight:600}}>{t("cl_vers")} {txt(p.suiv?.nom,p.suiv?.nom_ar)}</span></div>
                <div style={{fontSize:12,marginTop:3}}><span style={{color:"#059669",fontWeight:700}}>{p.admis} {t("cl_admis")}</span> · <span style={{color:"#dc2626"}}>{p.redouble} {t("cl_redoublants")}</span>{p.sansNote>0?` · ${p.sansNote} ${t("cl_sans_notes")}`:""}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:14,fontWeight:800,color:"#047857",marginTop:14,textAlign:"center"}}>{totalAdmis} {t("cl_total_promus")}</div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setPromo(false)}/><Btn ch={promoLoading?"...":t("cl_promouvoir")} v="success" onClick={promouvoir} disabled={promoLoading||totalAdmis===0}/></div>
        </>)}
      </Modal>}
    </div>
  );
}

// ── MATIÈRES ──────────────────────────────────────────────────────────────────
function Matieres({data,ops}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nom:"",nom_ar:"",coefficient:1,enseignant:"",cycles:[]});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const norm=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
  const toggleCycle=cyc=>setForm(f=>({...f,cycles:(f.cycles||[]).includes(cyc)?f.cycles.filter(c=>c!==cyc):[...(f.cycles||[]),cyc]}));
  const save=async()=>{
    if(!form.nom)return;
    // Anti-doublon : même nom (insensible casse/espaces)
    const doublon=data.matieres.find(m=>m.id!==modal&&norm(m.nom)===norm(form.nom));
    if(doublon){setErr(`${t("ma_doublon_a")} "${form.nom}" ${t("ma_doublon_b")}`);return;}
    setErr("");setLoading(true);
    if(modal==="add")await ops.addMat(form);else await ops.updateMat(modal,form);
    setLoading(false);setModal(null);
  };
  const openNew=()=>{setErr("");setForm({nom:"",nom_ar:"",coefficient:1,enseignant:"",cycles:[]});setModal("add");};
  // Matières d'un cycle (celles dont cycles inclut cyc, ou sans cycle = toutes)
  const matCycle=cyc=>data.matieres.filter(m=>!m.cycles||m.cycles.length===0||m.cycles.includes(cyc));
  return(
    <div>
      <SHdr title={t("nav_matieres")+" 📖"} sub={`${data.matieres.length} ${t("ma_count")}`} action={<div style={{display:"flex",gap:8,flexWrap:"wrap"}}><ExportBar name="matieres" title={t("nav_matieres")} getRows={()=>data.matieres.map(m=>({"Matière":m.nom,Coefficient:m.coefficient,Enseignant:m.enseignant||"",Cycles:(m.cycles||[]).join(", ")}))}/><Btn ch={t("btn_new_matiere")} v="primary" onClick={openNew}/></div>}/>
      {data.matieres.length===0?<Card><Empty icon="📖" text={t("ma_empty")}/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {CYCLES.map(cyc=>{
            const mats=matCycle(cyc);
            if(mats.length===0)return null;
            return(<div key={cyc}>
              <div style={{fontSize:13,fontWeight:800,color:"var(--me-text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>{cyc==="Maternelle"?"🟨":cyc==="Primaire"?"🟦":cyc==="Collège"?"🟪":"🟩"} {(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[cyc]||cyc)}</div>
              <Card s={{padding:0,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:"var(--me-surface-2,#f8fafc)"}}>{[t("ma_th_matiere"),t("ma_th_coeff"),t("ma_th_ens"),t("ma_th_cycles"),""].map((h,hi)=><th key={hi} style={{padding:"9px 14px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--me-text-3)",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
                  <tbody>{mats.map((m,i)=>(
                    <tr key={m.id} style={{borderTop:i>0?"1px solid #f8fafc":"none"}}>
                      <td style={{padding:"10px 14px",fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{txt(m.nom,m.nom_ar)}</td>
                      <td style={{padding:"10px 14px"}}><span style={{background:"rgba(26,86,219,0.12)",color:"#1a56db",borderRadius:7,padding:"2px 9px",fontSize:12,fontWeight:700}}>×{m.coefficient}</span></td>
                      <td style={{padding:"10px 14px",fontSize:12,color:"var(--me-text-2)"}}>{m.enseignant||"—"}</td>
                      <td style={{padding:"10px 14px",fontSize:11,color:"var(--me-text-3)"}}>{(!m.cycles||m.cycles.length===0)?t("ma_tous"):m.cycles.map(c=>(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[c]||c)).join(", ")}</td>
                      <td style={{padding:"10px 14px",textAlign:"right"}}><div style={{display:"inline-flex",gap:6}}>
                        <button onClick={()=>{setErr("");setForm({nom:m.nom,nom_ar:m.nom_ar||"",coefficient:m.coefficient,enseignant:m.enseignant||"",cycles:m.cycles||[]});setModal(m.id);}} style={{background:"var(--me-surface-2,#f1f5f9)",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>{t("btn_modifier")}</button>
                        <button onClick={()=>ops.deleteMat(m.id)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>{t("btn_supprimer")}</button>
                      </div></td>
                    </tr>
                  ))}</tbody>
                </table>
              </Card>
            </div>);
          })}
        </div>
      )}
      {modal&&<Modal title={modal==="add"?t("ma_new_titre"):t("ma_edit_titre")} onClose={()=>setModal(null)}>
        <Inp label={t("ma_nom")} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder={t("ma_nom_ph")}/>
        <Lbl t="الاسم بالعربية · Nom en arabe (facultatif)"><input dir="rtl" value={form.nom_ar||""} onChange={e=>setForm(f=>({...f,nom_ar:e.target.value}))} style={{...iSt(),fontFamily:"'Traditional Arabic','Amiri',serif",fontSize:15}} placeholder="الرياضيات"/></Lbl>
        <Inp label={t("ma_coeff")} type="number" value={form.coefficient} onChange={e=>setForm(f=>({...f,coefficient:e.target.value}))}/>
        <Inp label={t("ma_ens")} value={form.enseignant} onChange={e=>setForm(f=>({...f,enseignant:e.target.value}))}/>
        <Lbl t={t("ma_cycles_lbl")}>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {CYCLES.map(cyc=>{const on=(form.cycles||[]).includes(cyc);return(
              <button key={cyc} onClick={()=>toggleCycle(cyc)} style={{padding:"7px 13px",borderRadius:20,border:on?"2px solid #1a56db":"1.5px solid #e2e8f0",background:on?"#eff6ff":"#fff",color:on?"#1a56db":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{on?"✓ ":""}{(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[cyc]||cyc)}</button>
            );})}
          </div>
        </Lbl>
        {err&&<div style={{background:"rgba(220,38,38,0.10)",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,margin:"4px 0"}}>{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":t("btn_save")} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

// ── ÉLÈVES ────────────────────────────────────────────────────────────────────
function Professeurs({data,ops,etab}) {
  const devise=etab?.devise||"GNF";
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const blank={nom:"",prenom:"",genre:"",telephone:"",email:"",matieres_txt:"",date_embauche:"",type_salaire:"mensuel",salaire:"",taux_horaire:""};
  const [form,setForm]=useState(blank);
  const norm=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
  const save=async()=>{
    if(!form.nom||!form.prenom){setErr(t("pf_nom_oblig"));return;}
    const doublon=(data.professeurs||[]).find(p=>p.id!==modal&&norm(p.nom)===norm(form.nom)&&norm(p.prenom)===norm(form.prenom));
    if(doublon){setErr(`${t("pf_doublon_a")} "${form.prenom} ${form.nom}" ${t("ma_doublon_b")}`);return;}
    setErr("");setLoading(true);
    if(modal==="add")await ops.addProf(form);else await ops.updateProf(modal,form);
    setLoading(false);setModal(null);
  };
  const openNew=()=>{setErr("");setForm(blank);setModal("add");};
  const openEdit=p=>{setErr("");setForm({nom:p.nom,prenom:p.prenom,genre:p.genre||"",telephone:p.telephone||"",email:p.email||"",matieres_txt:p.matieres_txt||"",date_embauche:p.date_embauche||"",type_salaire:p.type_salaire||"mensuel",salaire:p.salaire??"",taux_horaire:p.taux_horaire??""});setModal(p.id);};

  // Vue détail d'un professeur (salaires + absences)
  if(sel){
    const p=(data.professeurs||[]).find(x=>x.id===sel);
    if(!p){setSel(null);return null;}
    return <ProfDetail {...{prof:p,data,ops,etab,devise,onBack:()=>setSel(null)}}/>;
  }

  return(
    <div>
      <SHdr title={t("nav_professeurs")+" 👨‍🏫"} sub={`${(data.professeurs||[]).length} ${t("pf_count")}`} action={<div style={{display:"flex",gap:8,flexWrap:"wrap"}}><ExportBar name="professeurs" title={t("nav_professeurs")} getRows={()=>(data.professeurs||[]).map(p=>({Nom:p.nom,"Prénom":p.prenom||"","Téléphone":p.telephone||"",Email:p.email||"","Matières":p.matieres_txt||"",Genre:p.genre||"","Rémunération":p.type_salaire==="horaire"?`${p.taux_horaire||""}/h`:`${p.salaire||""}/mois`,"Date embauche":p.date_embauche||""}))}/><Btn ch={t("btn_new_prof")} v="primary" onClick={openNew}/></div>}/>
      {(data.professeurs||[]).length===0?<Card><Empty icon="👨‍🏫" text={t("pf_empty")}/></Card>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:13}}>
          {(data.professeurs||[]).map(p=>{
            const abs=(data.absences_prof||[]).filter(a=>a.prof_id===p.id).length;
            return(
            <Card key={p.id} s={{cursor:"pointer"}}>
              <div onClick={()=>setSel(p.id)}>
                <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:10}}>
                  <div style={{width:42,height:42,borderRadius:11,background:"rgba(26,86,219,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#1a56db",fontSize:15}}>{p.prenom?.[0]}{p.nom?.[0]}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14,color:"var(--me-text)"}}>{p.prenom} {p.nom}</div>
                    <div style={{fontSize:11,color:"var(--me-text-3)"}}>{p.matieres_txt||"—"}</div>
                  </div>
                </div>
                <div style={{fontSize:12,color:"var(--me-text-2)",lineHeight:1.7}}>
                  {p.telephone&&<div>📞 {p.telephone}</div>}
                  <div>💰 {p.type_salaire==="horaire"?`${fmtMoney(p.taux_horaire,devise)}${t("pf_h")}`:`${fmtMoney(p.salaire,devise)}${t("pf_mois")}`}</div>
                  {abs>0&&<div style={{color:"#c2410c"}}>🚫 {abs} {t("pr_absences")}</div>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginTop:11,paddingTop:11,borderTop:"1px solid #f1f5f9"}}>
                <button onClick={()=>setSel(p.id)} style={{flex:1,background:"rgba(26,86,219,0.12)",color:"#1a56db",border:"none",borderRadius:8,padding:"7px",cursor:"pointer",fontSize:12,fontWeight:700}}>{t("pf_gerer")}</button>
                <button onClick={()=>openEdit(p)} style={{background:"var(--me-surface-2,#f1f5f9)",color:"var(--me-text-2)",border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_modifier")}</button>
                <button onClick={()=>ops.deleteProf(p.id)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{t("btn_supprimer")}</button>
              </div>
            </Card>
          );})}
        </div>
      )}
      {modal&&<Modal title={modal==="add"?t("pf_new_titre"):t("pf_edit_titre")} onClose={()=>setModal(null)} w={560}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={t("el_prenom")} value={form.prenom} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))}/>
          <Inp label={t("el_nom")} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/>
          <Inp label={t("pf_tel")} value={form.telephone} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))}/>
          <Inp label={t("pf_email")} value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
        </div>
        <Inp label={t("pf_matieres")} value={form.matieres_txt} onChange={e=>setForm(f=>({...f,matieres_txt:e.target.value}))} placeholder={t("pf_matieres_ph")}/>
        <Slt label={t("el_genre")} value={form.genre} onChange={e=>setForm(f=>({...f,genre:e.target.value}))} opts={[{v:"",l:t("el_choisir")},{v:"M",l:t("el_masculin")},{v:"F",l:t("el_feminin")}]}/>
        <Inp label={t("pf_embauche")} type="date" value={form.date_embauche} onChange={e=>setForm(f=>({...f,date_embauche:e.target.value}))}/>
        <Slt label={t("pf_type_remu")} value={form.type_salaire} onChange={e=>setForm(f=>({...f,type_salaire:e.target.value}))} opts={[{v:"mensuel",l:t("pf_remu_mensuel")},{v:"horaire",l:t("pf_remu_horaire")}]}/>
        {form.type_salaire==="horaire"
          ? <Inp label={`${t("pf_taux")} (${devise})`} type="number" value={form.taux_horaire} onChange={e=>setForm(f=>({...f,taux_horaire:e.target.value}))}/>
          : <Inp label={`${t("pf_salaire_m")} (${devise})`} type="number" value={form.salaire} onChange={e=>setForm(f=>({...f,salaire:e.target.value}))}/>}
        {err&&<div style={{background:"rgba(220,38,38,0.10)",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginTop:4}}>{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":t("btn_save")} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

// Détail d'un professeur : salaires versés + absences
function ProfDetail({prof,data,ops,etab,devise,onBack}) {
  const [modalSal,setModalSal]=useState(false);
  const [loading,setLoading]=useState(false);
  const MOIS=["Septembre","Octobre","Novembre","Décembre","Janvier","Février","Mars","Avril","Mai","Juin","Juillet"];
  const blankSal={mois:"",montant:prof.type_salaire==="mensuel"?(prof.salaire||""):"",date:TODAY,heures:"",note:""};
  const [salForm,setSalForm]=useState(blankSal);
  const [absDate,setAbsDate]=useState(TODAY);
  const [absMotif,setAbsMotif]=useState("");
  const salaires=(data.salaires||[]).filter(s=>s.prof_id===prof.id);
  const absences=(data.absences_prof||[]).filter(a=>a.prof_id===prof.id).sort((a,b)=>b.date.localeCompare(a.date));
  const totalVerse=salaires.reduce((s,x)=>s+(x.montant||0),0);
  const saveSal=async()=>{
    if(!salForm.montant)return;setLoading(true);
    const montant=salForm.heures&&prof.type_salaire==="horaire"?(parseFloat(salForm.heures)*parseFloat(prof.taux_horaire||0)):parseFloat(salForm.montant);
    await ops.addSalaire({prof_id:prof.id,prof_nom:`${prof.prenom} ${prof.nom}`,mois:salForm.mois,montant,date:salForm.date,heures:salForm.heures?parseFloat(salForm.heures):null,note:salForm.note});
    setLoading(false);setModalSal(false);setSalForm(blankSal);
  };
  const marquerAbsent=async()=>{if(!absDate)return;await ops.setProfPresence(prof.id,absDate,"absent",absMotif);setAbsMotif("");};
  return(
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#1a56db",cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:14,padding:0}}>{t("pf_retour")}</button>
      <Card s={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:54,height:54,borderRadius:14,background:"rgba(26,86,219,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#1a56db",fontSize:19}}>{prof.prenom?.[0]}{prof.nom?.[0]}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:18,color:"var(--me-text)"}}>{prof.prenom} {prof.nom}</div>
            <div style={{fontSize:12,color:"var(--me-text-2)"}}>{prof.matieres_txt||"—"}{prof.telephone?` · 📞 ${prof.telephone}`:""}</div>
            <div style={{fontSize:12,color:"var(--me-text-2)"}}>{prof.type_salaire==="horaire"?`${t("pf_taux_label")} ${fmtMoney(prof.taux_horaire,devise)}${t("pf_h")}`:`${t("pf_salaire_label")} ${fmtMoney(prof.salaire,devise)}${t("pf_mois")}`}{prof.date_embauche?` · ${t("pf_embauche_le")} ${prof.date_embauche}`:""}</div>
          </div>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* Salaires */}
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:"var(--me-text)"}}>{t("pf_salaires")}</div>
            <Btn ch={t("pf_verser")} v="primary" s={{padding:"6px 12px",fontSize:12}} onClick={()=>{setSalForm(blankSal);setModalSal(true);}}/>
          </div>
          <div style={{background:"rgba(5,150,105,0.12)",border:"1px solid #a7f3d0",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
            <div style={{fontSize:11,color:"#047857",fontWeight:700,textTransform:"uppercase"}}>{t("pf_total_verse")}</div>
            <div style={{fontSize:20,fontWeight:900,color:"#047857"}}>{fmtMoney(totalVerse,devise)}</div>
          </div>
          {salaires.length===0?<div style={{fontSize:12,color:"var(--me-text-3)",textAlign:"center",padding:10}}>{t("pa_aucun_versement")}</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {salaires.map(s=>(
                <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"var(--me-surface-2,#f8fafc)",borderRadius:9}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{fmtMoney(s.montant,devise)}</div>
                    <div style={{fontSize:11,color:"var(--me-text-3)"}}>{s.mois||"—"} · {s.date}{s.heures?` · ${s.heures}h`:""}</div>
                  </div>
                  <button onClick={()=>ops.deleteSalaire(s.id)} style={{background:"rgba(220,38,38,0.10)",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11}}>{t("btn_supprimer")}</button>
                </div>
              ))}
            </div>
          )}
        </Card>
        {/* Absences */}
        <Card>
          <div style={{fontWeight:800,fontSize:14,color:"var(--me-text)",marginBottom:12}}>{t("pf_absences")}</div>
          <div style={{background:"var(--me-surface-2,#f8fafc)",borderRadius:10,padding:12,marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--me-text-2)",marginBottom:7}}>{t("pf_marquer_abs")}</div>
            <input type="date" value={absDate} onChange={e=>setAbsDate(e.target.value)} style={{width:"100%",padding:"8px 11px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:7}}/>
            <input value={absMotif} onChange={e=>setAbsMotif(e.target.value)} placeholder={t("pf_motif_ph")} style={{width:"100%",padding:"8px 11px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:7,boxSizing:"border-box"}}/>
            <Btn ch={t("pf_marquer_absent")} v="ghost" s={{width:"100%"}} onClick={marquerAbsent}/>
          </div>
          {absences.length===0?<div style={{fontSize:12,color:"var(--me-text-3)",textAlign:"center",padding:10}}>{t("pf_aucune_abs")}</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {absences.map(a=>(
                <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"#fff7ed",borderRadius:9}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{a.date}</div>
                    {a.motif&&<div style={{fontSize:11,color:"#c2410c"}}>{a.motif}</div>}
                  </div>
                  <button onClick={()=>ops.setProfPresence(prof.id,a.date,"present")} style={{background:"var(--me-surface-2,#f1f5f9)",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11}}>↩️</button>
                </div>
              ))}
            </div>
          )}
        </Card>
      </div>
      {modalSal&&<Modal title={t("pf_verser_titre")} onClose={()=>setModalSal(false)}>
        <Slt label={t("pf_mois_conc")} value={salForm.mois} onChange={e=>setSalForm(f=>({...f,mois:e.target.value}))} opts={[{v:"",l:t("el_choisir")},...MOIS.map(m=>({v:m,l:m}))]}/>
        {prof.type_salaire==="horaire"&&<Inp label={t("pf_nb_heures")} type="number" value={salForm.heures} onChange={e=>setSalForm(f=>({...f,heures:e.target.value,montant:e.target.value?String(parseFloat(e.target.value)*parseFloat(prof.taux_horaire||0)):f.montant}))}/>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={`${t("pf_montant")} (${devise}) *`} type="number" value={salForm.montant} onChange={e=>setSalForm(f=>({...f,montant:e.target.value}))}/>
          <Inp label={`${t("pa_th_date")} *`} type="date" value={salForm.date} onChange={e=>setSalForm(f=>({...f,date:e.target.value}))}/>
        </div>
        <Inp label={t("pa_note")} value={salForm.note} onChange={e=>setSalForm(f=>({...f,note:e.target.value}))}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModalSal(false)}/><Btn ch={loading?"...":t("no_save")} v="success" onClick={saveSal} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

function EmploiTemps({data,ops,etab,currentUser}) {
  const JOURS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const JLAB={Lundi:t("edt_lundi"),Mardi:t("edt_mardi"),Mercredi:t("edt_mercredi"),Jeudi:t("edt_jeudi"),Vendredi:t("edt_vendredi"),Samedi:t("edt_samedi")};
  const jourLabel=j=>JLAB[j]||j;
  const [classeId,setClasseId]=useState(data.classes[0]?.id||"");
  const [modal,setModal]=useState(null);
  const [loading,setLoading]=useState(false);
  const blank={jour:"Lundi",debut:"08:00",fin:"09:00",matiere_id:"",prof_id:"",salle:""};
  const [form,setForm]=useState(blank);
  const [ctDate,setCtDate]=useState(TODAY);
  const [ctTitre,setCtTitre]=useState("");
  const classe=data.classes.find(c=>c.id===parseInt(classeId));
  const creneaux=(data.emploi_temps||[]).filter(c=>c.classe_id===parseInt(classeId)).sort((a,b)=>(a.debut||"").localeCompare(b.debut||""));
  const matsClasse=data.matieres.filter(m=>!m.cycles||m.cycles.length===0||m.cycles.includes(classe?.niveau));
  const save=async()=>{
    if(!form.matiere_id){return;}
    setLoading(true);
    const payload={...form,classe_id:parseInt(classeId),matiere_id:parseInt(form.matiere_id),prof_id:form.prof_id?parseInt(form.prof_id):null};
    if(modal==="add")await ops.addCreneau(payload);else await ops.updateCreneau(modal,payload);
    setLoading(false);setModal(null);
  };
  const openNew=(jour)=>{setForm({...blank,jour:jour||"Lundi"});setModal("add");};
  const matNom=id=>{const m=data.matieres.find(m=>m.id===id);return m?txt(m.nom,m.nom_ar):"—";};
  const profNom=id=>{const p=data.professeurs?.find(x=>x.id===id);return p?`${p.prenom} ${p.nom}`:"";};
  const printEDT=()=>{
    if(!classe)return;
    const byJour=JOURS.map(j=>({j,items:creneaux.filter(c=>c.jour===j)})).filter(x=>x.items.length>0);
    const corps=byJour.map(({j,items})=>`
      <div style="margin-bottom:10px">
        <div style="background:#1a56db;color:#fff;font-weight:700;padding:5px 10px;border-radius:6px 6px 0 0;font-size:12px">${j}</div>
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr style="background:#f1f5f9">
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Horaire</th>
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Matière</th>
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Professeur</th>
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Salle</th>
          </tr></thead>
          <tbody>${items.map(c=>`<tr>
            <td style="border:1px solid #e2e8f0;padding:5px"><b>${c.debut} - ${c.fin}</b></td>
            <td style="border:1px solid #e2e8f0;padding:5px">${matNom(c.matiere_id)}</td>
            <td style="border:1px solid #e2e8f0;padding:5px">${profNom(c.prof_id)||"—"}</td>
            <td style="border:1px solid #e2e8f0;padding:5px">${c.salle||"—"}</td>
          </tr>`).join("")}</tbody>
        </table>
      </div>`).join("");
    printHTML(`${officialHeader(etab,{classe:classe.nom,docTitle:"EMPLOI DU TEMPS"})}${corps||"<p>Aucun cours programmé.</p>"}`,`Emploi du temps ${classe.nom}`,{etab});
  };
  return(
    <div>
      <SHdr title={t("nav_emploi")+" 🗓️"} sub={classe?`${t("no_classe")} : ${txt(classe.nom,classe.nom_ar)}`:t("edt_choisir_classe")} action={creneaux.length>0&&<Btn ch={t("btn_print")} v="ghost" onClick={printEDT}/>}/>
      {data.classes.length===0?<Card><Empty icon="🏫" text={t("fn_creez")}/></Card>:(<>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18,flexWrap:"wrap"}}>
          <select value={classeId} onChange={e=>setClasseId(e.target.value)} style={{padding:"9px 13px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,fontWeight:700,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",color:"var(--me-text)"}}>
            {CYCLES.map(cyc=>{const cls=data.classes.filter(c=>(c.niveau||"Primaire")===cyc);if(cls.length===0)return null;return(
              <optgroup key={cyc} label={(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[cyc]||cyc)}>{cls.map(c=><option key={c.id} value={c.id}>{txt(c.nom,c.nom_ar)}</option>)}</optgroup>
            );})}
          </select>
          <Btn ch={t("edt_add_cours")} v="primary" onClick={()=>openNew()}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {JOURS.map(jour=>{
            const items=creneaux.filter(c=>c.jour===jour);
            return(
              <Card key={jour} s={{padding:0,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 15px",background:"#1a56db"}}>
                  <span style={{fontWeight:800,fontSize:14,color:"#fff"}}>{jourLabel(jour)}</span>
                  <button onClick={()=>openNew(jour)} style={{background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",borderRadius:7,width:26,height:26,cursor:"pointer",fontSize:16,lineHeight:1}}>+</button>
                </div>
                <div style={{padding:12}}>
                  {items.length===0?<div style={{fontSize:12,color:"#cbd5e1",textAlign:"center",padding:"14px 0"}}>{t("edt_aucun_cours")}</div>:(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {items.map(c=>(
                        <div key={c.id} style={{background:"var(--me-surface-2,#f8fafc)",borderRadius:10,padding:"9px 11px",borderLeft:"3px solid #1a56db"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:11,fontWeight:800,color:"#1a56db"}}>{c.debut} - {c.fin}</div>
                              <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{matNom(c.matiere_id)}</div>
                              {profNom(c.prof_id)&&<div style={{fontSize:11,color:"var(--me-text-2)"}}>👨‍🏫 {profNom(c.prof_id)}</div>}
                              {c.salle&&<div style={{fontSize:11,color:"var(--me-text-2)"}}>📍 {c.salle}</div>}
                            </div>
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={()=>{setForm({jour:c.jour,debut:c.debut,fin:c.fin,matiere_id:String(c.matiere_id||""),prof_id:String(c.prof_id||""),salle:c.salle||""});setModal(c.id);}} style={{background:"var(--me-surface,#fff)",border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:10}}>{t("btn_modifier")}</button>
                              <button onClick={()=>ops.deleteCreneau(c.id)} style={{background:"rgba(220,38,38,0.10)",border:"none",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:10}}>{t("btn_supprimer")}</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </Card>
            );
          })}
        </div>
        {/* Cahier de texte / Leçon du jour */}
        <Card s={{marginTop:18}}>
          <div style={{fontWeight:800,fontSize:14,color:"var(--me-text)",marginBottom:4,fontFamily:"'Sora',sans-serif"}}>{t("edt_cahier")}</div>
          <div style={{fontSize:11,color:"var(--me-text-2)",marginBottom:14}}>{t("edt_cahier_note_a")} {txt(classe?.nom,classe?.nom_ar)} {t("edt_cahier_note_b")}</div>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap",marginBottom:14}}>
            <div style={{width:170}}><Inp label={t("pa_th_date")} type="date" value={ctDate} onChange={e=>setCtDate(e.target.value)}/></div>
            <div style={{flex:1,minWidth:220}}><Inp label={t("edt_lecon")} value={ctTitre} onChange={e=>setCtTitre(e.target.value)} placeholder={t("edt_lecon_ph")}/></div>
            <Btn ch={t("edt_save_lecon")} v="success" onClick={()=>{if(ctTitre.trim()){ops.setTitreJour(parseInt(classeId),ctDate,ctTitre,`${currentUser?.prenom||""} ${currentUser?.nom||""}`.trim());setCtTitre("");}}} disabled={!ctTitre.trim()}/>
          </div>
          {(()=>{const list=(data.titres_jour||[]).filter(t=>t.classe_id===parseInt(classeId));return list.length===0?<div style={{fontSize:12,color:"var(--me-text-3)"}}>{I18N[CURRENT_LANG]?.edt_aucune_lecon||I18N.fr.edt_aucune_lecon}</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {list.slice(0,12).map(tj=>(
                <div key={tj.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 13px",background:"var(--me-surface-2,#f8fafc)",borderRadius:10,borderLeft:"3px solid #1a56db"}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#1a56db",minWidth:88}}>{tj.date}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,color:"var(--me-text)",fontWeight:600}}>{tj.titre}</div>{tj.auteur&&<div style={{fontSize:10.5,color:"var(--me-text-3)"}}>✍️ {tj.auteur}</div>}</div>
                  <button onClick={()=>ops.setTitreJour(parseInt(classeId),tj.date,"",tj.auteur)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11}}>{t("btn_supprimer")}</button>
                </div>
              ))}
            </div>
          );})()}
        </Card>
      </>)}
      {modal&&<Modal title={modal==="add"?t("edt_add_titre"):t("edt_edit_titre")} onClose={()=>setModal(null)}>
        <Slt label={t("edt_jour")} value={form.jour} onChange={e=>setForm(f=>({...f,jour:e.target.value}))} opts={JOURS.map(j=>({v:j,l:jourLabel(j)}))}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={t("edt_debut")} type="time" value={form.debut} onChange={e=>setForm(f=>({...f,debut:e.target.value}))}/>
          <Inp label={t("edt_fin")} type="time" value={form.fin} onChange={e=>setForm(f=>({...f,fin:e.target.value}))}/>
        </div>
        <Slt label={t("edt_matiere")} value={form.matiere_id} onChange={e=>setForm(f=>({...f,matiere_id:e.target.value}))} opts={[{v:"",l:t("el_choisir")},...matsClasse.map(m=>({v:String(m.id),l:txt(m.nom,m.nom_ar)}))]}/>
        <Slt label={t("edt_prof")} value={form.prof_id} onChange={e=>setForm(f=>({...f,prof_id:e.target.value}))} opts={[{v:"",l:t("edt_aucun")},...(data.professeurs||[]).map(p=>({v:String(p.id),l:`${p.prenom} ${p.nom}`}))]}/>
        <Inp label={t("edt_salle")} value={form.salle} onChange={e=>setForm(f=>({...f,salle:e.target.value}))} placeholder={t("edt_salle_ph")}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch={t("btn_annuler")} v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":t("btn_save")} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

function FicheNotes({data,ops,etab,onEtabUpdate}) {
  const ALIGNS=[{v:"left",l:t("fn_align_g")},{v:"center",l:t("fn_align_c")},{v:"right",l:t("fn_align_d")}];
  const COULEURS=["#1a56db","#0f766e","#7c3aed","#b91c1c","#c2410c","#475569","#0f172a"];
  const colDefaut=()=>([
    {nom:"N°",largeur:40,couleur:"#1a56db",align:"center"},
    {nom:"Nom & Prénom",largeur:200,couleur:"#1a56db",align:"left",auto:"nom"},
    {nom:"Matricule",largeur:110,couleur:"#1a56db",align:"center",auto:"matricule"},
    {nom:"Devoir 1",largeur:80,couleur:"#0f766e",align:"center"},
    {nom:"Devoir 2",largeur:80,couleur:"#0f766e",align:"center"},
    {nom:"Composition",largeur:90,couleur:"#7c3aed",align:"center"},
    {nom:"Moyenne",largeur:80,couleur:"#b91c1c",align:"center"},
    {nom:"Observations",largeur:150,couleur:"#475569",align:"left"},
  ]);
  const [classeId,setClasseId]=useState(data.classes[0]?.id||"");
  const fnPeriodes=periodesList(etab); const [fnPeriode,setFnPeriode]=useState(fnPeriodes[0]);
  const [cols,setCols]=useState(colDefaut());
  const [lignesVides,setLignesVides]=useState(3);
  const [nbPages,setNbPages]=useState(1);
  const [statActif,setStatActif]=useState(true);
  const [statPos,setStatPos]=useState("left");
  const [statTaille,setStatTaille]=useState("m");
  const [statVPos,setStatVPos]=useState("apres");
  const computeStatRows=(cl,per)=>{
    const els=data.eleves.filter(e=>e.classe_id===parseInt(cl));
    const niv=(data.classes.find(c=>c.id===parseInt(cl))||{}).niveau;
    const bareme=baremeOf(niv); const seuil=bareme/2;
    const isF=e=>(e.genre||"").toLowerCase().startsWith("f");
    const valOf=e=>{const m=parseFloat(calcMoy(e.notes||{},data.matieres,per));return isNaN(m)?null:m;};
    const insc=els, inscF=insc.filter(isF);
    const comp=insc.filter(e=>valOf(e)!=null), compF=comp.filter(isF);
    const moy=comp.filter(e=>valOf(e)>=seuil), moyF=moy.filter(isF);
    const pct=(a,b)=>b?Math.round(a/b*100)+"%":"0%";
    return [
      {label:t("stat_inscrit"), total:String(insc.length), filles:String(inscF.length)},
      {label:t("stat_ont_compose"), total:String(comp.length), filles:String(compF.length)},
      {label:t("stat_pas_compose"), total:String(insc.length-comp.length), filles:String(inscF.length-compF.length)},
      {label:t("stat_ont_moyenne"), total:String(moy.length), filles:String(moyF.length)},
      {label:t("stat_pas_moyenne"), total:String(comp.length-moy.length), filles:String(compF.length-moyF.length)},
      {label:t("stat_pourcentage"), total:pct(moy.length,comp.length), filles:pct(moyF.length,compF.length)},
    ];
  };
  const blankStatRows=()=>([
    {label:t("stat_inscrit"),total:"",filles:""},
    {label:t("stat_ont_compose"),total:"",filles:""},
    {label:t("stat_pas_compose"),total:"",filles:""},
    {label:t("stat_ont_moyenne"),total:"",filles:""},
    {label:t("stat_pas_moyenne"),total:"",filles:""},
    {label:t("stat_pourcentage"),total:"",filles:""},
  ]);
  const [statRows,setStatRows]=useState(()=>blankStatRows());
  const [modeImpr,setModeImpr]=useState("noms"); // "noms" = avec élèves · "vierge" = sans noms
  const setStatCell=(i,k,v)=>setStatRows(rs=>{const n=[...rs];n[i]={...n[i],[k]:v};return n;});
  const addStatRow=()=>setStatRows(rs=>[...rs,{label:"",total:"",filles:""}]);
  const delStatRow=i=>setStatRows(rs=>rs.filter((_,j)=>j!==i));
  const [titre,setTitre]=useState("FICHE DE NOTES");
  const [matiereFiche,setMatiereFiche]=useState("");
  const [modeleNom,setModeleNom]=useState("");
  const modeles=Array.isArray(etab.fiche_modeles)?etab.fiche_modeles:[];
  const classe=data.classes.find(c=>c.id===parseInt(classeId));
  const eleves=data.eleves.filter(e=>e.classe_id===parseInt(classeId));
  // Reconnaît le rôle d'une colonne par son drapeau OU par son titre (robuste si on supprime/recrée une colonne)
  const colKind=(c)=>{
    if(c.auto)return c.auto;
    const n=(c.nom||"").toLowerCase().trim();
    if(!n)return null;
    if(n==="n°"||n==="n"||n==="no"||n==="#"||/\bnum[ée]ro\b|\bnum\b/.test(n))return "num";
    if(/\bmatricule\b|\bmatr\b/.test(n))return "matricule";
    const hasPrenom=/pr[ée]noms?/.test(n);
    const hasNom=/\bnoms?\b/.test(n.replace(/pr[ée]noms?/g,"#"));
    if(hasNom)return "nom";      // "Nom" ou "Nom & Prénom" → nom complet (prénom + nom)
    if(hasPrenom)return "prenom";
    return null;
  };

  const setCol=(i,k,v)=>setCols(cs=>{const n=[...cs];n[i]={...n[i],[k]:v};return n;});
  const addCol=()=>setCols(cs=>[...cs,{nom:"Nouvelle colonne",largeur:80,couleur:"#0f766e",align:"center"}]);
  const delCol=i=>setCols(cs=>cs.filter((_,j)=>j!==i));
  const moveCol=(i,dir)=>setCols(cs=>{const n=[...cs];const j=i+dir;if(j<0||j>=n.length)return cs;[n[i],n[j]]=[n[j],n[i]];return n;});

  const saveModele=async()=>{
    if(!modeleNom.trim())return;
    const nouveau={nom:modeleNom.trim(),cols,lignesVides,titre};
    const autres=modeles.filter(m=>m.nom!==nouveau.nom);
    const updated=await ops.updateEtab(etab.id,{fiche_modeles:[...autres,nouveau]});
    if(updated){onEtabUpdate(updated);setModeleNom("");}
  };
  const chargerModele=m=>{setCols(m.cols||colDefaut());setLignesVides(m.lignesVides??3);setTitre(m.titre||"FICHE DE NOTES");};
  const supprModele=async(nom)=>{
    const updated=await ops.updateEtab(etab.id,{fiche_modeles:modeles.filter(m=>m.nom!==nom)});
    if(updated)onEtabUpdate(updated);
  };

  const imprimer=()=>{
    if(!classe)return;
    const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const colgroup=`<colgroup>${cols.map(c=>`<col style="width:${c.largeur}px">`).join("")}</colgroup>`;
    const thCell=(c,rs)=>{
      const rot=parseInt(c.rot)||0;
      let inner=esc(c.nom),extra="";
      if(rot===90||rot===270){inner=`<span style="display:inline-block;writing-mode:vertical-rl;${rot===90?"transform:rotate(180deg);":""}white-space:nowrap">${esc(c.nom)}</span>`;extra="height:96px;vertical-align:middle;";}
      else if(rot===180){inner=`<span style="display:inline-block;transform:rotate(180deg)">${esc(c.nom)}</span>`;}
      return `<th ${rs?'rowspan="2"':""} style="border:1px solid #94a3b8;padding:6px 8px;background:${c.couleur};color:#fff;font-size:11px;text-align:${c.align};${extra}">${inner}</th>`;
    };
    const runs=[];cols.forEach(c=>{const g=(c.groupe||"").trim();const last=runs[runs.length-1];if(g&&last&&last.groupe===g)last.items.push(c);else runs.push({groupe:g,items:[c]});});
    const hasGroups=runs.some(r=>r.groupe!=="");
    let theadHTML;
    if(!hasGroups){
      theadHTML=`<thead><tr>${cols.map(c=>thCell(c,false)).join("")}</tr></thead>`;
    } else {
      const top=runs.map(r=>r.groupe!==""?`<th colspan="${r.items.length}" style="border:1px solid #94a3b8;padding:6px 8px;background:#1e3a8a;color:#fff;font-size:11px;text-align:center">${esc(r.groupe)}</th>`:thCell(r.items[0],true)).join("");
      const bottom=runs.map(r=>r.groupe!==""?r.items.map(c=>thCell(c,false)).join(""):"").join("");
      theadHTML=`<thead><tr>${top}</tr><tr>${bottom}</tr></thead>`;
    }
    const rowHTML=(k)=>`<tr>${cols.map(c=>{
      const kind=colKind(c);
      let val="";
      if(kind==="num")val=k+1;
      else if(modeImpr==="noms"&&k<eleves.length){const e=eleves[k];
        if(kind==="nom")val=`${esc(e.prenom||"")} ${esc(e.nom||"")}`.trim();
        else if(kind==="prenom")val=esc(e.prenom||"");
        else if(kind==="matricule")val=esc(e.matricule||"");}
      return `<td style="border:1px solid #cbd5e1;padding:6px 8px;font-size:11px;text-align:${c.align};height:24px">${val}</td>`;
    }).join("")}</tr>`;
    const SZ={p:{fs:9.5,pad:"3px 9px"},m:{fs:11,pad:"5px 12px"},g:{fs:13,pad:"8px 16px"}}[statTaille]||{fs:11,pad:"5px 12px"};
    const statHTML=(statActif&&statRows.length)?`<div style="text-align:${statPos}"><table style="border-collapse:collapse;margin-top:22px;display:inline-block;width:auto;text-align:left">
      <thead><tr>
        <th style="border:1px solid #94a3b8;padding:${SZ.pad};background:#1a56db;color:#fff;font-size:${SZ.fs}px;text-align:left">${t("stat_tableau").replace("📊 ","")}</th>
        <th style="border:1px solid #94a3b8;padding:${SZ.pad};background:#1a56db;color:#fff;font-size:${SZ.fs}px;text-align:center">${t("stat_total")}</th>
        <th style="border:1px solid #94a3b8;padding:${SZ.pad};background:#1a56db;color:#fff;font-size:${SZ.fs}px;text-align:center">${t("stat_filles")}</th>
      </tr></thead>
      <tbody>${statRows.map(r=>`<tr><td style="border:1px solid #cbd5e1;padding:${SZ.pad};font-size:${SZ.fs}px;font-weight:600">${esc(r.label)}</td><td style="border:1px solid #cbd5e1;padding:${SZ.pad};font-size:${SZ.fs}px;text-align:center">${esc(r.total)}</td><td style="border:1px solid #cbd5e1;padding:${SZ.pad};font-size:${SZ.fs}px;text-align:center">${esc(r.filles)}</td></tr>`).join("")}</tbody>
    </table></div>`:"";
    // Pagination continue : numérotation suivie sur N pages, en-tête une seule fois, place réservée pour le tableau stat en bas
    const N=Math.max(1,parseInt(nbPages)||1);
    const PER=34, HEADROWS=7, STATRES=statActif?9:1;
    const counts=[];
    for(let p=0;p<N;p++){let c=PER;if(p===0)c-=HEADROWS;if(p===N-1)c-=STATRES;counts.push(Math.max(1,c));}
    let total=counts.reduce((a,b)=>a+b,0);
    if(modeImpr==="noms"&&eleves.length>total){counts[counts.length-1]+=eleves.length-total;total=eleves.length;}
    let k=0,body="";
    for(let p=0;p<N;p++){
      const first=p===0,last=p===N-1;
      let rows="";for(let r=0;r<counts[p];r++){rows+=rowHTML(k);k++;}
      const head=first?officialHeader(etab,{classe:classe.nom,docTitle:titre,matiere:matiereFiche}):"";
      const thead=first?theadHTML:"";
      const table=`<table style="width:100%;border-collapse:collapse;table-layout:fixed;margin-top:8px">${colgroup}${thead}<tbody>${rows}</tbody></table>`;
      if(last&&statHTML&&statVPos==="bas"){
        body+=`<div style="min-height:96vh;display:flex;flex-direction:column">${head}${table}<div style="margin-top:auto">${statHTML}</div></div>`;
      } else {
        body+=`<div style="${last?"":"page-break-after:always"}">${head}${table}${last?statHTML:""}</div>`;
      }
    }
    printHTML(body,`${titre} ${classe.nom}`,{etab});
  };

  return(
    <div>
      <SHdr title={t("sh_fiche")+" 🖨️"} sub={t("fn_sub")} action={classe&&<Btn ch={t("btn_print_fiche")} v="primary" onClick={imprimer}/>}/>
      {data.classes.length===0?<Card><Empty icon="🏫" text={t("fn_creez")}/></Card>:(<>
        <Card s={{marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:13}}>
            <div>
              <Lbl t={t("no_classe")}><select value={classeId} onChange={e=>setClasseId(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                {CYCLES.map(cyc=>{const cls=data.classes.filter(c=>(c.niveau||"Primaire")===cyc);if(cls.length===0)return null;return(<optgroup key={cyc} label={(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[cyc]||cyc)}>{cls.map(c=><option key={c.id} value={c.id}>{txt(c.nom,c.nom_ar)}</option>)}</optgroup>);})}
              </select></Lbl>
            </div>
            <Inp label={t("fn_titre")} value={titre} onChange={e=>setTitre(e.target.value)}/>
            <div>
              <Lbl t={t("no_matiere")}><input list="fn-mat-list" value={matiereFiche} onChange={e=>setMatiereFiche(e.target.value)} placeholder={t("fn_matiere_ph")} style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/></Lbl>
              <datalist id="fn-mat-list">{data.matieres.map(m=><option key={m.id} value={txt(m.nom,m.nom_ar)}/>)}</datalist>
            </div>
            <Inp label={t("fn_lignes")} type="number" value={lignesVides} onChange={e=>setLignesVides(Math.max(0,parseInt(e.target.value)||0))}/>
            <Inp label={t("fn_nb_pages")} type="number" value={nbPages} onChange={e=>setNbPages(Math.max(1,parseInt(e.target.value)||1))}/>
            <div>
              <Lbl t={t("fn_mode_impr")}><select value={modeImpr} onChange={e=>setModeImpr(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                <option value="noms">{t("fn_mode_noms")}</option>
                <option value="vierge">{t("fn_mode_vierge")}</option>
              </select></Lbl>
            </div>
          </div>
          <div style={{fontSize:12,color:"var(--me-text-2)",marginTop:6}}>👥 {eleves.length} {t("db_eleves")} {t("fn_prefill_a")} {lignesVides} {t("fn_prefill_b")}</div>
        </Card>

        <Card s={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:"var(--me-text)"}}>{t("fn_colonnes")}</div>
            <Btn ch={t("fn_add_col")} v="ghost" s={{padding:"6px 12px",fontSize:12}} onClick={addCol}/>
          </div>
          <div style={{fontSize:11,color:"var(--me-text-3)",marginBottom:11,marginTop:-4}}>{t("fn_groupe_aide")}</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {cols.map((c,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",background:"var(--me-surface-2,#f8fafc)",borderRadius:10,padding:"8px 10px"}}>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  <button onClick={()=>moveCol(i,-1)} style={{background:"var(--me-surface,#fff)",border:"1px solid #e2e8f0",borderRadius:5,cursor:"pointer",fontSize:9,lineHeight:1,padding:"1px 5px"}}>▲</button>
                  <button onClick={()=>moveCol(i,1)} style={{background:"var(--me-surface,#fff)",border:"1px solid #e2e8f0",borderRadius:5,cursor:"pointer",fontSize:9,lineHeight:1,padding:"1px 5px"}}>▼</button>
                </div>
                <input value={c.nom} onChange={e=>setCol(i,"nom",e.target.value)} placeholder={t("fn_col_nom_ph")} style={{flex:1,minWidth:120,padding:"7px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
                <input value={c.groupe||""} onChange={e=>setCol(i,"groupe",e.target.value)} placeholder={t("fn_groupe_ph")} title={t("fn_groupe_ph")} style={{width:110,padding:"7px 10px",borderRadius:8,border:"1.5px dashed #cbd5e1",fontSize:12,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
                {(()=>{const kind=colKind(c);return kind?<span style={{fontSize:10,background:"#dbeafe",color:"#1a56db",borderRadius:6,padding:"2px 7px",fontWeight:700}}>auto : {kind}</span>:null;})()}
                <label style={{fontSize:10,color:"var(--me-text-3)",display:"flex",alignItems:"center",gap:4}}>{t("fn_largeur")}<input type="number" value={c.largeur} onChange={e=>setCol(i,"largeur",parseInt(e.target.value)||60)} style={{width:54,padding:"6px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none"}}/></label>

            <table style={{borderCollapse:"collapse",width:"100%"}}>
              <thead>{(()=>{
                const thFor=(c,ri,rowSpan)=>{const rot=parseInt(c.rot)||0;const vs=(rot===90||rot===270)?{writingMode:"vertical-rl",transform:rot===90?"rotate(180deg)":"none"}:rot===180?{transform:"rotate(180deg)"}:{};return <th key={ri} rowSpan={rowSpan} style={{border:"1px solid #94a3b8",padding:"6px 8px",background:c.couleur,color:"#fff",fontSize:11,textAlign:c.align,minWidth:c.largeur,height:(rot===90||rot===270)?90:"auto"}}><span style={{display:"inline-block",whiteSpace:"nowrap",...vs}}>{c.nom}</span></th>;};
                const runs=[];cols.forEach(c=>{const g=(c.groupe||"").trim();const last=runs[runs.length-1];if(g&&last&&last.groupe===g)last.items.push(c);else runs.push({groupe:g,items:[c]});});
                const hasGroups=runs.some(r=>r.groupe!=="");
                if(!hasGroups)return <tr>{cols.map((c,i)=>thFor(c,i,1))}</tr>;
                let bi=0;
                return <><tr>{runs.map((r,ri)=>r.groupe!==""?<th key={"g"+ri} colSpan={r.items.length} style={{border:"1px solid #94a3b8",padding:"6px 8px",background:"#1e3a8a",color:"#fff",fontSize:11,textAlign:"center"}}>{r.groupe}</th>:thFor(r.items[0],"t"+ri,2))}</tr><tr>{runs.flatMap((r)=>r.groupe!==""?r.items.map(c=>thFor(c,"b"+(bi++),1)):[])}</tr></>;
              })()}</thead>
              <tbody>
                {eleves.slice(0,3).map((e,i)=><tr key={e.id}>{cols.map((c,j)=>{const kind=colKind(c);let v="";if(kind==="num")v=i+1;else if(modeImpr==="noms"){if(kind==="nom")v=`${e.prenom||""} ${e.nom||""}`.trim();else if(kind==="prenom")v=e.prenom||"";else if(kind==="matricule")v=e.matricule||"";}return <td key={j} style={{border:"1px solid #cbd5e1",padding:"6px 8px",fontSize:11,textAlign:c.align}}>{v}</td>;})}</tr>)}
                {eleves.length>3&&<tr><td colSpan={cols.length} style={{textAlign:"center",fontSize:11,color:"var(--me-text-3)",padding:6}}>… +{eleves.length-3} {t("fn_autres_b")}</td></tr>}

            <input value={modeleNom} onChange={e=>setModeleNom(e.target.value)} placeholder={t("fn_modele_ph")} style={{flex:1,minWidth:180,padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
            <Btn ch={t("fn_save_modele")} v="success" onClick={saveModele}/>
          </div>
          {modeles.length===0?<div style={{fontSize:12,color:"var(--me-text-3)"}}>{t("fn_aucun_modele")}</div>:(
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {modeles.map(m=>(
                <div key={m.nom} style={{display:"flex",alignItems:"center",gap:8,background:"var(--me-surface-2,#f8fafc)",border:"1.5px solid #e2e8f0",borderRadius:9,padding:"6px 6px 6px 12px"}}>
                  <button onClick={()=>chargerModele(m)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,color:"#1a56db"}}>{m.nom}</button>
                  <button onClick={()=>supprModele(m.nom)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:6,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✕</button>
                </div>
              ))}
            </div>
          )}

        {/* Tableau statistique éditable (imprimé sur la dernière page) */}
        {classe&&(
          <Card>

              <div style={{fontWeight:700,fontSize:13,color:"var(--me-text)"}}>{t("stat_tableau")} — {txt(classe.nom,classe.nom_ar)}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",marginBottom:11}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,fontWeight:600,color:"var(--me-text)",cursor:"pointer"}}>
                <input type="checkbox" checked={statActif} onChange={e=>setStatActif(e.target.checked)}/>{t("fn_stat_inclure")}
              </label>
              {statActif&&<div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:11,fontWeight:700,color:"var(--me-text-3)"}}>{t("fn_stat_pos")}</span>
                <select value={statPos} onChange={e=>setStatPos(e.target.value)} style={{padding:"5px 9px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                  <option value="left">{t("fn_align_g")}</option><option value="center">{t("fn_align_c")}</option><option value="right">{t("fn_align_d")}</option>
                </select>
                <span style={{fontSize:11,fontWeight:700,color:"var(--me-text-3)",marginLeft:4}}>{t("fn_stat_taille")}</span>
                <select value={statTaille} onChange={e=>setStatTaille(e.target.value)} style={{padding:"5px 9px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                  <option value="p">{t("fn_taille_p")}</option><option value="m">{t("fn_taille_m")}</option><option value="g">{t("fn_taille_g")}</option>
                </select>
                <span style={{fontSize:11,fontWeight:700,color:"var(--me-text-3)",marginLeft:4}}>{t("fn_stat_vpos")}</span>
                <select value={statVPos} onChange={e=>setStatVPos(e.target.value)} style={{padding:"5px 9px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                  <option value="apres">{t("fn_vpos_apres")}</option><option value="bas">{t("fn_vpos_bas")}</option>
                </select>
              </div>}
            </div>
            <div style={{overflowX:"auto",display:"flex",justifyContent:statPos==="center"?"center":statPos==="right"?"flex-end":"flex-start"}}>
              <table style={{borderCollapse:"collapse",width:"auto"}}>
                <thead><tr>{[t("fn_stat_libelle"),t("stat_total"),t("stat_filles"),""].map((h,i)=><th key={i} style={{padding:"6px 9px",fontSize:10,fontWeight:700,color:"var(--me-text-3)",textTransform:"uppercase",textAlign:"left"}}>{h}</th>)}</tr></thead>
                <tbody>{statRows.map((r,i)=>(
                  <tr key={i}>
                    <td style={{padding:"3px 6px"}}><input value={r.label} onChange={e=>setStatCell(i,"label",e.target.value)} style={{width:170,padding:"6px 9px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/></td>
                    <td style={{padding:"3px 6px"}}><input value={r.total} onChange={e=>setStatCell(i,"total",e.target.value)} style={{width:70,padding:"6px 9px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:700,textAlign:"center",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/></td>
                    <td style={{padding:"3px 6px"}}><input value={r.filles} onChange={e=>setStatCell(i,"filles",e.target.value)} style={{width:70,padding:"6px 9px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:700,textAlign:"center",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/></td>
                    <td style={{padding:"3px 6px"}}><button onClick={()=>delStatRow(i)} style={{background:"rgba(220,38,38,0.10)",color:"#dc2626",border:"none",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:11}}>✕</button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <Btn ch={t("fn_stat_ligne")} v="ghost" s={{padding:"6px 12px",fontSize:12,marginTop:9}} onClick={addStatRow}/>
          </Card>
        )}
      </>)}
    </div>
  );
}

function Eleves({data,ops,etab}) {
  const [modal,setModal]=useState(null);const [search,setSearch]=useState("");const [filterCl,setFilterCl]=useState("");
  const [form,setForm]=useState({nom:"",prenom:"",genre:"",classe_id:"",date_naissance:"",lieu_naissance:"",tuteur:"",pere:"",tel_pere:"",mere:"",tel_mere:"",telephone:"",frais_annuel:"",frais_inscription_eleve:"",inscPayee:false});
  const [loading,setLoading]=useState(false);const [err,setErr]=useState("");
  // Import / Export Excel
  const [impOpen,setImpOpen]=useState(false);const [impRows,setImpRows]=useState([]);const [impClasse,setImpClasse]=useState("");const [impLoading,setImpLoading]=useState(false);const [impErr,setImpErr]=useState("");
  const impFileRef=useRef(null);
  const mapRow=(row)=>{
    const get=(keys,excl=[])=>{const found=Object.keys(row).find(h=>{const hl=h.toLowerCase().trim();if(excl.some(x=>hl.includes(x)))return false;return keys.some(k=>hl===k||hl.includes(k));});return found?String(row[found]).trim():"";};
    const gRaw=get(["genre","sexe"]);const genre=/^\s*(f|fille|fémin|femin)/i.test(gRaw)?"F":/^\s*(m|gar|mascul|h)/i.test(gRaw)?"M":"";
    return {nom:get(["nom"],["prénom","prenom"]),prenom:get(["prénom","prenom"]),genre,date_naissance:get(["date de naissance","naissance","date_naissance"]),lieu_naissance:get(["lieu"]),pere:get(["père","pere"],["tél","tel","numéro","numero"]),tel_pere:get(["tél père","tel pere","téléphone père","tel du père","tel père"]),mere:get(["mère","mere"],["tél","tel","numéro","numero"]),tel_mere:get(["tél mère","tel mere","téléphone mère","tel mère"]),telephone:get(["téléphone","telephone","tel","contact"],["père","pere","mère","mere"]),tuteur:get(["tuteur","tutrice"])};
  };
  const eleveRows=()=>data.eleves.map(e=>{const cl=data.classes.find(c=>c.id===e.classe_id);return {Matricule:e.matricule,Nom:e.nom,"Prénom":e.prenom,Genre:e.genre||"",Classe:cl?cl.nom:"","Date de naissance":e.date_naissance||"","Lieu de naissance":e.lieu_naissance||"","Père":e.pere||"","Tél père":e.tel_pere||"","Mère":e.mere||"","Tél mère":e.tel_mere||"","Téléphone":e.telephone||"",Tuteur:e.tuteur||""};});
  const doExport=async()=>{
    const rows=eleveRows();
    if(!rows.length){alert(t("imp_rien_exporter"));return;}
    try{await exportXLSX(rows,`eleves_${(etab.nom||"ecole").replace(/\s+/g,"_")}.xlsx`,"Élèves");}catch(e2){alert(e2.message);}
  };
  const doExportWord=()=>{
    const rows=eleveRows();
    if(!rows.length){alert(t("imp_rien_exporter"));return;}
    exportDOC(rows,`eleves_${(etab.nom||"ecole").replace(/\s+/g,"_")}.doc`,`${t("nav_eleves")} — ${etab.nom||""}`);
  };
  const pickImport=async(ev)=>{
    const file=ev.target.files?.[0];if(!file)return;setImpErr("");
    try{const raw=await readXLSX(file);const mapped=raw.map(mapRow).filter(r=>r.nom&&r.prenom);setImpRows(mapped);if(!mapped.length)setImpErr(t("imp_aucun"));}catch(e2){setImpErr(e2.message);}
    if(impFileRef.current)impFileRef.current.value="";
  };
  const confirmImport=async()=>{
    const cid=parseInt(impClasse)||data.classes[0]?.id;if(!cid)return;
    const norm=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
    const existing=data.eleves.filter(e=>e.classe_id===cid);
    const toAdd=impRows.filter(r=>!existing.some(e=>norm(e.nom)===norm(r.nom)&&norm(e.prenom)===norm(r.prenom)));
    if(!toAdd.length){setImpErr(t("imp_doublons"));return;}
    setImpLoading(true);await ops.importEleves(toAdd,etab.prefixe,cid);setImpLoading(false);setImpOpen(false);setImpRows([]);
  };
  const save=async()=>{
    if(!form.nom||!form.prenom)return;
    // Anti-doublon : même nom+prénom dans la même classe
    const norm=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
    const cid=parseInt(form.classe_id)||data.classes[0]?.id;
    const doublon=data.eleves.find(e=>e.id!==modal&&norm(e.nom)===norm(form.nom)&&norm(e.prenom)===norm(form.prenom)&&e.classe_id===cid);
    if(doublon){setErr(`${t("el_doublon_a")} "${form.prenom} ${form.nom}" ${t("el_doublon_b")}`);return;}
    setErr("");setLoading(true);
    const {inscPayee,...data2}=form;
    if(modal==="add"){
      const created=await ops.addEleve({...data2,classe_id:cid,prefixe:etab.prefixe});
      if(created&&inscPayee){
        const clCreated=data.classes.find(c=>c.id===created.classe_id);
        const montantInsc=fraisInscEleve(created,etab,clCreated);
        if(montantInsc>0)await ops.addPaiement({eleve_id:created.id,type:"Frais d'inscription",montant:montantInsc,date:TODAY,mois:"",note:"Réglé à l'inscription",eleve_nom:`${created.prenom} ${created.nom}`,matricule:created.matricule});
      }
    } else await ops.updateEleve(modal,{...data2,classe_id:parseInt(form.classe_id)});
    setLoading(false);setModal(null);
  };
  const [cycle,setCycle]=useState("Primaire");
  const classesCycle=data.classes.filter(c=>(c.niveau||"Primaire")===cycle);
  const countCycle=cyc=>data.eleves.filter(e=>{const c=data.classes.find(x=>x.id===e.classe_id);return (c?.niveau||"Primaire")===cyc;}).length;
  const matchSearch=e=>`${e.prenom} ${e.nom} ${e.matricule}`.toLowerCase().includes(search.toLowerCase());
  return(
    <div>
      <SHdr title={t("nav_eleves")+" 👨‍🎓"} sub={`${data.eleves.length} ${t("el_total")}`} action={
        <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("el_search")} style={{padding:"8px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",width:160}}/>
          <Btn ch={t("el_inscrire")} v="primary" onClick={()=>{setErr("");setForm({nom:"",prenom:"",genre:"",classe_id:classesCycle[0]?.id||data.classes[0]?.id||"",date_naissance:"",lieu_naissance:"",tuteur:"",pere:"",tel_pere:"",mere:"",tel_mere:"",telephone:"",frais_annuel:"",frais_inscription_eleve:"",inscPayee:false});setModal("add");}}/>
        </div>
      }/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        <Btn ch={t("imp_export")} v="ghost" onClick={doExport}/>
        <Btn ch={t("imp_word")} v="ghost" onClick={doExportWord}/>
        <Btn ch={t("imp_import")} v="ghost" onClick={()=>{setImpErr("");setImpRows([]);setImpClasse(classesCycle[0]?.id||data.classes[0]?.id||"");setImpOpen(true);}}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {CYCLES.map(cyc=>{const actif=cycle===cyc;const n=countCycle(cyc);return(
          <button key={cyc} onClick={()=>setCycle(cyc)} style={{flex:1,padding:"13px 16px",borderRadius:13,border:actif?"2px solid #1a56db":"1.5px solid var(--me-border-2)",background:actif?"rgba(26,86,219,0.13)":"var(--me-surface)",cursor:"pointer",textAlign:"left",transition:"all .15s",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
            <div style={{fontSize:13,fontWeight:800,color:actif?"#1a56db":"var(--me-text)"}}>{cyc==="Primaire"?"🟦":cyc==="Collège"?"🟪":"🟩"} {(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[cyc]||cyc)}</div>
            <div style={{fontSize:22,fontWeight:900,color:actif?"#1a56db":"var(--me-text)",marginTop:2}}>{n}<span style={{fontSize:11,color:"var(--me-text-3)",fontWeight:600}}> {t("db_eleves")}</span></div>
          </button>
        );})}
      </div>
      {classesCycle.length===0?<Card><Empty icon="🏫" text={`${t("el_aucune1")} ${(({Maternelle:t("cyc_mat"),Primaire:t("cyc_pri"),"Collège":t("cyc_col"),"Lycée":t("cyc_lyc")})[cycle]||cycle)}. ${t("el_aucune2")}`}/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {classesCycle.map(cl=>{
            const elevesClasse=data.eleves.filter(e=>e.classe_id===cl.id&&matchSearch(e));
            return(
              <Card key={cl.id} s={{padding:0,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 18px",background:"var(--me-surface-2,#f8fafc)",borderBottom:"1px solid #eef2f7"}}>
                  <div style={{fontWeight:800,fontSize:14,color:"var(--me-text)"}}>🏫 {txt(cl.nom,cl.nom_ar)}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {(()=>{const g=elevesClasse.filter(e=>e.genre==="M").length;const f=elevesClasse.filter(e=>e.genre==="F").length;return (g+f)>0?<span style={{display:"inline-flex",gap:5}}><span style={{fontSize:11,fontWeight:700,color:"#2563eb",background:"rgba(26,86,219,0.12)",borderRadius:6,padding:"1px 7px"}}>M : {g}</span><span style={{fontSize:11,fontWeight:700,color:"#db2777",background:"rgba(219,39,119,0.12)",borderRadius:6,padding:"1px 7px"}}>F : {f}</span></span>:null;})()}
                    <span style={{background:"#1a56db",color:"#fff",borderRadius:20,padding:"3px 13px",fontSize:12,fontWeight:800}}>{elevesClasse.length} {t("db_eleves")}</span>
                  </div>
                </div>
                {elevesClasse.length===0?<div style={{padding:"18px",textAlign:"center",color:"var(--me-text-3)",fontSize:12}}>{search?t("el_aucun_resultat"):t("el_aucun_eleve")}</div>:(
